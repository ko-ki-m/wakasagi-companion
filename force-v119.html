<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wakasagi Map v11.9 Senior UI</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;padding:24px;font-size:20px;line-height:1.6}
    button{font-size:22px;min-height:60px;padding:12px 18px;border-radius:14px}
  </style>
</head>
<body>
  <h1>Wakasagi Map v11.9 Senior UI</h1>
  <p>v11.9を開きます。</p>
  <button id="openBtn">v11.9を開く</button>
  <script>
    function openMap(){
      const src = new URL(location.href);
      const dst = new URL("./map-v119.html", location.href);
      src.searchParams.forEach((v,k)=>dst.searchParams.set(k,v));
      dst.searchParams.set("v","v119_final_20260509");
      dst.searchParams.set("force", String(Date.now()));
      dst.hash = src.hash || "";
      location.replace(dst.toString());
    }
    document.getElementById("openBtn").addEventListener("click", openMap);
    openMap();
  </script>
</body>
</html>
