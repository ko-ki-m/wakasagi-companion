<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Wakasagi Map cache reset</title><style>body{font-family:system-ui,-apple-system,sans-serif;padding:20px;line-height:1.6;background:#0f172a;color:#fff}button,a{display:inline-block;margin:8px 0;padding:12px 14px;border-radius:12px;background:#0b84ff;color:#fff;text-decoration:none;border:0;font-weight:800}.box{background:#fff;color:#111;border-radius:16px;padding:16px;max-width:680px}</style></head><body><div class='box'><h1>Wakasagi Map キャッシュ更新</h1><p id='msg'>古いService Workerとキャッシュを削除しています...</p><button id='go'>もう一度実行</button><br><a href='./index.html?v=7'>v7を開く</a></div><script>async function reset(){const msg=document.getElementById('msg');try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if('caches' in window){const keys=await caches.keys();await Promise.all(keys.filter(k=>k.indexOf('wakasa')>=0||k.indexOf('wakasagi')>=0).map(k=>caches.delete(k)));}msg.textContent='削除完了。v7を開きます。';setTimeout(()=>location.replace('./index.html?v=7&ts='+Date.now()),800);}catch(e){msg.textContent='削除中にエラー: '+(e&&e.message?e.message:e);}}document.getElementById('go').onclick=reset;reset();</script></body></html>
