<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Wakasagi Map Reset</title>
</head>
<body>
<p>Wakasagi Map v11.9 の強制更新へ移動します...</p>
<script>
  const u = new URL('./force-v119.html', location.href);
  const src = new URLSearchParams(location.search || '');
  for (const [k, v] of src.entries()) u.searchParams.set(k, v);
  u.searchParams.set('force', String(Date.now()));
  if (location.hash) u.hash = location.hash;
  location.replace(u.toString());
</script>
<p><a href="./force-v119.html">移動しない場合はこちら</a></p>
</body>
</html>
