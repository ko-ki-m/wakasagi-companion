<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"><title>Wakasagi Map Reset</title></head>
<body><h1>Wakasagi Map Reset</h1><p>Service WorkerとCacheを削除して、v11.8.4へ戻します。</p><button id="go">v11.8.4を開く</button>
<script>
async function go(){try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}}catch(e){}try{if(window.caches){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}}catch(e){}location.replace('./map-v1184.html?v=1184&force='+Date.now()+(location.hash||''));}
document.getElementById('go').onclick=go;setTimeout(go,300);
</script></body></html>
