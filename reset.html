<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wakasagi Map reset</title><style>body{font-family:system-ui,-apple-system,sans-serif;margin:0;padding:24px;background:#07111f;color:#fff}.card{max-width:680px;margin:0 auto;background:#fff;color:#111;border-radius:18px;padding:18px}</style></head><body><div class="card"><h1>Wakasagi Map v11.2.1.1.1 更新中</h1><p>古いキャッシュとService Workerを削除して、v11を開きます。</p><p id="s">準備中...</p></div><script>(async()=>{const s=document.getElementById('s');try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs)await r.unregister();}if('caches'in window){const keys=await caches.keys();for(const k of keys){if(k.includes('wakasa')||k.includes('wakasagi'))await caches.delete(k);}}s.textContent='更新完了。v11へ移動します。';}catch(e){s.textContent='更新処理でエラー: '+(e&&e.message?e.message:e);}setTimeout(()=>{location.href='./index.html?v=11211&reset='+Date.now();},700);})();</script></body></html>
