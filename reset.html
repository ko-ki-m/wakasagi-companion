<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wakasagi Map Reset</title>
<style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;padding:24px;font-size:18px;line-height:1.6}button{font-size:20px;min-height:56px;padding:12px 18px;border-radius:12px}</style>
</head>
<body>
<h1>Wakasagi Map Reset</h1>
<p>Service Worker と Cache を削除します。</p>
<button id="resetBtn">リセットしてv11.8.4を開く</button>
<script>
async function resetAll(){
  try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}}catch(e){}
  try{if('caches' in window){const names=await caches.keys();await Promise.all(names.map(n=>caches.delete(n)));}}catch(e){}
  location.href = "./force-v1184.html?v=1184_previous_display&force=" + Date.now();
}
document.getElementById("resetBtn").addEventListener("click", resetAll);
</script>
</body>
</html>
