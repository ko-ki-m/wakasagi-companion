<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Wakasagi GPS Bridge</title>
  <style>
    :root{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111;background:#f7f7f7;}
    body{margin:0;padding:20px;line-height:1.6;}
    .card{max-width:560px;margin:0 auto;padding:18px;border-radius:16px;background:#fff;box-shadow:0 2px 14px rgba(0,0,0,.10);}
    h1{font-size:22px;margin:0 0 10px;}
    p{margin:8px 0;}
    .status{font-size:20px;font-weight:700;margin:16px 0;padding:12px;border-radius:12px;background:#f0f0f0;}
    .small{font-size:14px;color:#555;word-break:break-word;}
    button{width:100%;font-size:20px;font-weight:700;padding:14px 16px;border:0;border-radius:14px;background:#111;color:#fff;}
    button:disabled{opacity:.45;}
    .err{background:#ffe8e8;color:#8a0000;}
    .ok{background:#e9f8ec;color:#075d1a;}
  </style>
</head>
<body>
  <main class="card">
    <h1>Wakasagi GPS Bridge</h1>
    <p>HTTPSでスマホGPSを取得し、Pico Wのログページへ戻します。</p>
    <div id="status" class="status">準備中...</div>
    <button id="btn" type="button">GPSを取得して戻る</button>
    <p id="detail" class="small"></p>
  </main>

<script>
(function(){
  'use strict';

  const statusEl = document.getElementById('status');
  const detailEl = document.getElementById('detail');
  const btn = document.getElementById('btn');

  const qs = new URLSearchParams(location.search);
  const returnUrl = qs.get('return_url') || '';
  const sid = qs.get('sid') || '';

  const startedAt = Date.now();
  const MIN_WAIT_MS = 3500;
  const MAX_WAIT_MS = 18000;
  const GOOD_ACC_M = 35;

  let running = false;
  let returned = false;
  let watchId = null;
  let latest = null;
  let best = null;
  let samples = 0;
  let finishTimer = null;

  function setStatus(text, kind){
    statusEl.textContent = text;
    statusEl.className = 'status' + (kind ? ' ' + kind : '');
  }

  function setDetail(text){
    detailEl.textContent = text || '';
  }

  function encodePayload(obj){
    const json = JSON.stringify(obj);
    if(window.TextEncoder){
      const bytes = new TextEncoder().encode(json);
      let bin = '';
      for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin);
    }
    return btoa(unescape(encodeURIComponent(json)));
  }

  function buildBackUrl(payload){
    const base = String(returnUrl || '').split('#')[0];
    const b64 = encodePayload(payload);
    return base + '#gpsbridge=' + encodeURIComponent(b64);
  }

  function validateReturnUrl(){
    if(!returnUrl){
      setStatus('戻り先がありません', 'err');
      setDetail('Pico Wの/logから開き直してください。');
      return false;
    }
    return true;
  }

  function stopWatch(){
    if(watchId !== null){
      try{ navigator.geolocation.clearWatch(watchId); }catch(e){}
      watchId = null;
    }
    if(finishTimer){
      clearTimeout(finishTimer);
      finishTimer = null;
    }
  }

  function toSimplePosition(pos){
    const c = pos && pos.coords ? pos.coords : {};
    const lat = Number(c.latitude);
    const lng = Number(c.longitude);
    const acc = Number(c.accuracy || 0);
    const ts = Number(pos && pos.timestamp ? pos.timestamp : Date.now());
    if(!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
    return {
      lat: lat,
      lng: lng,
      acc: Number.isFinite(acc) ? acc : 999999,
      ts: Number.isFinite(ts) ? ts : Date.now()
    };
  }

  function isBetter(a, b){
    if(!b) return true;
    const aFresh = a.ts >= startedAt - 1000;
    const bFresh = b.ts >= startedAt - 1000;
    if(aFresh !== bFresh) return aFresh;
    if(a.acc !== b.acc) return a.acc < b.acc;
    return a.ts > b.ts;
  }

  function updatePosition(pos){
    if(returned) return;

    const p = toSimplePosition(pos);
    if(!p) return;

    samples += 1;
    latest = p;
    if(isBetter(p, best)) best = p;

    const elapsed = Date.now() - startedAt;
    const ageSec = Math.max(0, (Date.now() - p.ts) / 1000);
    setStatus('現在地を測位中... ' + samples + '回', '');
    setDetail(
      '緯度 ' + p.lat.toFixed(7) +
      ' / 経度 ' + p.lng.toFixed(7) +
      ' / 精度 ' + p.acc.toFixed(1) + 'm' +
      ' / 位置情報年齢 ' + ageSec.toFixed(1) + '秒'
    );

    const freshEnough = p.ts >= startedAt - 1000;
    const canReturnByGoodAccuracy = elapsed >= 2500 && freshEnough && p.acc <= GOOD_ACC_M;
    const canReturnBySamples = elapsed >= MIN_WAIT_MS && freshEnough && samples >= 2;
    if(canReturnByGoodAccuracy || canReturnBySamples){
      finish('ok');
    }
  }

  function finish(reason){
    if(returned) return;

    const p = best || latest;
    if(!p){
      if(Date.now() - startedAt >= MAX_WAIT_MS){
        fail({message:'位置情報が取得できませんでした'});
      }
      return;
    }

    returned = true;
    stopWatch();

    const payload = {
      sid: sid,
      lat: p.lat.toFixed(7),
      lng: p.lng.toFixed(7),
      acc: Number.isFinite(p.acc) ? p.acc.toFixed(1) : '',
      pos_ms: p.ts,
      t_ms: Date.now(),
      samples: samples,
      source: 'github_gps_bridge_watch'
    };

    setStatus('GPS取得済み。ログへ戻ります...', 'ok');
    setDetail('緯度 ' + payload.lat + ' / 経度 ' + payload.lng + ' / 精度 ' + payload.acc + 'm / samples=' + samples);
    location.replace(buildBackUrl(payload));
  }

  function fail(err){
    stopWatch();
    running = false;
    btn.disabled = false;
    const msg = err && err.message ? err.message : 'unknown';
    setStatus('GPS取得失敗', 'err');
    setDetail(msg);
  }

  function startGps(){
    if(running || returned) return;
    if(!validateReturnUrl()) return;

    if(!('geolocation' in navigator)){
      setStatus('GPS不可: geolocationなし', 'err');
      setDetail('このブラウザでは位置情報APIが使えません。');
      return;
    }

    running = true;
    btn.disabled = true;
    setStatus('現在地を取得中...', '');
    setDetail('位置情報の許可を求められたら許可してください。');

    try{
      watchId = navigator.geolocation.watchPosition(
        updatePosition,
        fail,
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );

      finishTimer = setTimeout(function(){
        finish('timeout');
      }, MAX_WAIT_MS);
    }catch(e){
      fail(e);
    }
  }

  btn.addEventListener('click', startGps);

  if(validateReturnUrl()){
    setStatus('GPSを取得します...', '');
    setTimeout(startGps, 300);
  }
})();
</script>
</body>
</html>
