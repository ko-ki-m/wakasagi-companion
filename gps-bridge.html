<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wakasagi GPS Bridge</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:18px;line-height:1.6;}
  h1{font-size:1.4rem;margin:0 0 12px;}
  .box{padding:12px;border:1px solid #ccc;border-radius:10px;margin:12px 0;}
  .small{font-size:0.92rem;color:#555;}
  button{font-size:1.05rem;padding:10px 14px;margin:6px 4px 6px 0;}
</style>
</head>
<body>
<h1>GPS取得中</h1>
<p>この画面を前面にしたまま、スマホの現在地を取得しています。</p>
<p>取得後は自動でPico Wのログページへ戻ります。</p>
<div class="box">
  <div id="state">測位待ち...</div>
  <div id="detail" class="small">準備中</div>
</div>
<button id="retry" type="button">もう一度取得</button>
<button id="back" type="button">ログページへ戻る</button>
<script>
(function(){
  'use strict';

  const VERSION = 'gps-bridge-20260529p-one-digit';
  const TARGET_ACC_M = 8.0;
  const ACCEPT_ACC_M = 9.9;
  const MAX_ATTEMPTS = 8;
  const POSITION_TIMEOUT_MS = 20000;
  const RETRY_DELAY_MS = 1200;
  const MAXIMUM_AGE_MS = 0;

  const qs = new URLSearchParams(location.search || '');
  const hs = new URLSearchParams((location.hash || '').replace(/^#/, ''));

  function param(name){
    return qs.get(name) || hs.get(name) || '';
  }

  const returnUrl = param('return_url') || param('return') || param('returnUrl') || param('back') || param('u') || '';
  const sid = param('sid');
  const reason = param('reason') || 'gps_bridge_result';
  const triggerSeq = param('trigger_seq');
  const activityGapMs = param('activity_gap_ms');
  const activityCount = param('activity_count');

  const stateEl = document.getElementById('state');
  const detailEl = document.getElementById('detail');
  const retryBtn = document.getElementById('retry');
  const backBtn = document.getElementById('back');

  let running = false;
  let lastPayload = null;

  function setState(msg){
    if(stateEl) stateEl.textContent = msg;
  }

  function setDetail(msg){
    if(detailEl) detailEl.textContent = msg;
  }

  function sleep(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function encodePayload(obj){
    const json = JSON.stringify(obj);
    return btoa(unescape(encodeURIComponent(json)));
  }

  function buildReturnHash(payload){
    return '#gpsbridge=' + encodeURIComponent(encodePayload(payload));
  }

  function goBack(payload){
    lastPayload = payload || lastPayload || { ok:false, error:'no_payload', source:'github_gps_bridge', bridge_version:VERSION };
    if(!returnUrl){
      setState('ログページへ戻るURLがありません');
      setDetail('Pico Wの/logから開き直してください。');
      return;
    }
    const base = String(returnUrl).split('#')[0];
    location.replace(base + buildReturnHash(lastPayload));
  }

  function getOnce(){
    return new Promise((resolve, reject) => {
      if(!navigator.geolocation){
        reject(new Error('geolocation_not_supported'));
        return;
      }
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy:true,
        timeout:POSITION_TIMEOUT_MS,
        maximumAge:MAXIMUM_AGE_MS
      });
    });
  }

  function makePayload(ok, pos, extra){
    const coords = pos && pos.coords ? pos.coords : null;
    const acc = coords ? Number(coords.accuracy) : NaN;
    const payload = Object.assign({
      ok:!!ok,
      source:'github_gps_bridge',
      bridge_version:VERSION,
      reason:reason,
      sid:sid || '',
      trigger_seq:triggerSeq || '',
      activity_gap_ms:activityGapMs || '',
      activity_count:activityCount || '',
      target_acc_m:String(TARGET_ACC_M),
      accept_acc_m:String(ACCEPT_ACC_M),
      timeout_ms:String(POSITION_TIMEOUT_MS),
      maximum_age_ms:String(MAXIMUM_AGE_MS)
    }, extra || {});
    if(coords){
      payload.lat = Number(coords.latitude).toFixed(7);
      payload.lng = Number(coords.longitude).toFixed(7);
      payload.acc = Number.isFinite(acc) ? acc.toFixed(1) : '';
      payload.pos_ms = String(Number(pos.timestamp || Date.now()));
    }
    return payload;
  }

  async function runGps(){
    if(running) return;
    running = true;
    setState('GPS取得中...');
    setDetail('高精度位置情報を取得しています。');

    let bestPos = null;
    let bestAcc = Infinity;
    let lastErr = null;
    let accepted = false;
    let targetMet = false;
    let attemptsDone = 0;

    for(let i=1; i<=MAX_ATTEMPTS; i++){
      attemptsDone = i;
      setState('GPS取得中... ' + i + '/' + MAX_ATTEMPTS);
      try{
        const pos = await getOnce();
        const acc = Number(pos && pos.coords ? pos.coords.accuracy : NaN);
        if(Number.isFinite(acc)){
          setDetail('acc=' + acc.toFixed(1) + 'm / best=' + (Number.isFinite(bestAcc) ? bestAcc.toFixed(1) : '-') + 'm');
          if(acc < bestAcc){
            bestAcc = acc;
            bestPos = pos;
          }
          if(acc <= TARGET_ACC_M){
            accepted = true;
            targetMet = true;
            break;
          }
          if(acc <= ACCEPT_ACC_M){
            accepted = true;
            break;
          }
        }
      }catch(e){
        lastErr = e;
        setDetail('取得エラー: ' + (e && (e.message || e.code) ? (e.message || e.code) : String(e)));
      }
      if(i < MAX_ATTEMPTS) await sleep(RETRY_DELAY_MS);
    }

    let payload;
    if(bestPos){
      payload = makePayload(true, bestPos, {
        attempts:String(attemptsDone),
        accepted:String(accepted),
        target_met:String(targetMet),
        error:''
      });
      setState('GPS取得完了。ログページへ戻ります。');
      setDetail('best acc=' + (Number.isFinite(bestAcc) ? bestAcc.toFixed(1) : '-') + 'm');
      setTimeout(() => goBack(payload), 250);
    }else{
      payload = makePayload(false, null, {
        attempts:String(attemptsDone),
        accepted:'false',
        target_met:'false',
        error:lastErr && (lastErr.message || lastErr.code) ? String(lastErr.message || lastErr.code) : 'gps_failed'
      });
      setState('GPS取得に失敗しました。ログページへ戻ります。');
      setTimeout(() => goBack(payload), 600);
    }
    lastPayload = payload;
    running = false;
  }

  if(retryBtn) retryBtn.addEventListener('click', () => runGps());
  if(backBtn) backBtn.addEventListener('click', () => goBack(lastPayload));

  window.addEventListener('load', () => {
    setTimeout(runGps, 120);
  });
})();
</script>
</body>
</html>
