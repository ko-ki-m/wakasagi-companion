<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Wakasagi GPS Bridge</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f7f7f7;color:#111;}
    main{max-width:560px;margin:0 auto;padding:22px 16px;}
    .card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
    h1{font-size:20px;margin:0 0 10px;}
    #status{font-size:16px;font-weight:700;line-height:1.6;}
    #detail{font-size:13px;line-height:1.7;margin-top:8px;color:#444;white-space:pre-line;}
    button{font-size:16px;padding:12px 14px;border-radius:10px;border:1px solid #bbb;background:#fff;margin-top:14px;width:100%;}
  </style>
</head>
<body>
<main>
  <div class="card">
    <h1>GPS取得中</h1>
    <div id="status">スマホの現在地を高精度取得しています。</div>
    <div id="detail">最大20秒だけ測位し、10m以下が出たら即ログページへ戻ります。10m以下にならない場合も、最良値で戻ります。</div>
    <button id="retry" type="button" style="display:none;">もう一度取得</button>
    <button id="back" type="button" style="display:none;">ログページへ戻る</button>
  </div>
</main>

<script>
(function(){
  'use strict';

  const VERSION = 'gps-bridge-20260530r-watch20s';
  const GOOD_ACC_M = 10.0;
  const TARGET_ACC_M = 8.0;
  const MAX_TOTAL_MS = 20000;
  const GET_ONCE_TIMEOUT_MS = 12000;
  const MAX_AGE_MS = 0;

  const $ = (id)=>document.getElementById(id);
  const statusEl = $('status');
  const detailEl = $('detail');
  const retryBtn = $('retry');
  const backBtn = $('back');

  let startedAt = 0;
  let finished = false;
  let watchId = null;
  let finishTimer = null;
  let sampleCount = 0;
  let best = null;
  let lastError = null;

  function qs(name){
    try{ return new URL(location.href).searchParams.get(name) || ''; }
    catch(e){ return ''; }
  }

  function setStatus(s,d){
    if(statusEl) statusEl.textContent = s || '';
    if(detailEl) detailEl.textContent = d || '';
  }

  function elapsedMs(){
    return startedAt ? Math.max(0, Date.now() - startedAt) : 0;
  }

  function b64Json(obj){
    const json = JSON.stringify(obj || {});
    const bytes = new TextEncoder().encode(json);
    let bin = '';
    for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }

  function normalizeReturnUrl(){
    const rawReturn = qs('return_url');
    const pico = qs('pico');
    let ret = rawReturn || '';

    if(!ret && pico){
      ret = String(pico).replace(/\/+$/,'') + '/log';
    }
    if(!ret){
      ret = '/';
    }

    try{
      const u = new URL(ret, location.href);
      u.hash = '';
      return u.toString();
    }catch(e){
      return String(ret).split('#')[0];
    }
  }

  const returnUrl = normalizeReturnUrl();
  const sid = qs('sid');
  const reqT = qs('t');
  const reason = qs('reason') || 'gps_bridge';
  const triggerSeq = qs('trigger_seq');
  const triggerTms = qs('trigger_t_ms');
  const activityGapMs = qs('activity_gap_ms');
  const activityCount = qs('activity_count');

  function cleanup(){
    if(watchId !== null){
      try{ navigator.geolocation.clearWatch(watchId); }catch(e){}
      watchId = null;
    }
    if(finishTimer){
      clearTimeout(finishTimer);
      finishTimer = null;
    }
  }

  function returnToLog(payload){
    cleanup();

    const p = Object.assign({
      v: 1,
      source: 'github_gps_bridge',
      bridge_version: VERSION,
      sid: sid,
      reason: reason,
      req_t: reqT,
      trigger_seq: triggerSeq,
      trigger_t_ms: triggerTms,
      activity_gap_ms: activityGapMs,
      activity_count: activityCount,
      bridge_ms: Date.now(),
      elapsed_ms: elapsedMs(),
      timeout_ms: MAX_TOTAL_MS,
      maximum_age_ms: MAX_AGE_MS,
      method: 'watchPosition_plus_getCurrentPosition'
    }, payload || {});

    location.href = returnUrl.split('#')[0] + '#gpsbridge=' + encodeURIComponent(b64Json(p));
  }

  function showReturnOnly(msg, detail){
    cleanup();
    setStatus(msg || 'GPS取得に失敗しました', detail || 'ログページへ戻ります。');
    if(backBtn){
      backBtn.style.display = '';
      backBtn.onclick = function(){
        returnToLog({ ok:false, error:'manual_return', error_message:msg || '' });
      };
    }
  }

  function posToPlain(pos, sourceName){
    const c = pos && pos.coords ? pos.coords : {};
    const posMs = Number(pos && pos.timestamp ? pos.timestamp : Date.now());
    return {
      lat: Number(c.latitude),
      lng: Number(c.longitude),
      acc: Number(c.accuracy || 0),
      pos_ms: Number.isFinite(posMs) ? posMs : Date.now(),
      pos_age_ms: Number.isFinite(posMs) ? Math.max(0, Date.now() - posMs) : 0,
      sample_source: sourceName || 'geolocation'
    };
  }

  function validPlain(p){
    return !!p && Number.isFinite(p.lat) && Number.isFinite(p.lng) && Number.isFinite(p.acc) && p.acc > 0;
  }

  function betterThanBest(p){
    if(!validPlain(p)) return false;
    if(!best) return true;
    if(p.acc < best.acc) return true;
    if(p.acc === best.acc && p.pos_ms > best.pos_ms) return true;
    return false;
  }

  function errorText(err){
    if(!err) return '';
    const code = Number(err.code || 0);
    const msg = String(err.message || '');
    return 'code=' + code + (msg ? ' ' + msg : '');
  }

  function buildSuccessPayload(accepted){
    const acc = best && Number.isFinite(best.acc) ? best.acc : 0;
    const gpsQuality = acc > 0 && acc <= GOOD_ACC_M ? 'confirmed' : 'low_accuracy';

    return {
      ok: true,
      lat: best.lat,
      lng: best.lng,
      acc: acc,
      best_acc: acc,
      pos_ms: Number(best.pos_ms || Date.now()),
      pos_age_ms: Number(best.pos_age_ms || 0),
      t_ms: Date.now(),
      sample_count: Number(sampleCount || 0),
      target_acc_m: TARGET_ACC_M,
      accept_acc_m: GOOD_ACC_M,
      target_met: !!(acc > 0 && acc <= TARGET_ACC_M),
      accepted: !!accepted,
      gps_quality: gpsQuality,
      gps_quality_label: gpsQuality === 'confirmed' ? '精度良好' : '精度注意',
      sample_source: String(best.sample_source || ''),
      last_error: errorText(lastError)
    };
  }

  function finishWithBest(accepted){
    if(finished) return;
    finished = true;

    if(validPlain(best)){
      const accText = Number(best.acc).toFixed(1);
      setStatus(accepted ? 'GPS取得成功' : 'GPS精度注意', '採用候補 acc=' + accText + 'm\nログページへ戻ります。');
      setTimeout(()=>returnToLog(buildSuccessPayload(accepted)), 150);
      return;
    }

    const err = lastError || {};
    returnToLog({
      ok: false,
      error: 'geolocation_error',
      code: Number(err.code || 0),
      error_message: String(err.message || 'position unavailable'),
      sample_count: Number(sampleCount || 0),
      target_acc_m: TARGET_ACC_M,
      accept_acc_m: GOOD_ACC_M,
      t_ms: Date.now()
    });
  }

  function handleSample(pos, sourceName){
    if(finished) return;

    const p = posToPlain(pos, sourceName);
    if(!validPlain(p)) return;

    sampleCount++;
    if(betterThanBest(p)){
      best = Object.assign({ sample_no:sampleCount }, p);
    }

    const currentAcc = Number(p.acc).toFixed(1);
    const bestAcc = best && Number.isFinite(best.acc) ? Number(best.acc).toFixed(1) : '-';
    const remain = Math.max(0, Math.ceil((MAX_TOTAL_MS - elapsedMs()) / 1000));

    setStatus(
      best.acc <= GOOD_ACC_M ? 'GPS取得成功' : 'GPS測位中',
      '今回 acc=' + currentAcc + 'm\n最良 acc=' + bestAcc + 'm\nサンプル=' + sampleCount + '\n残り最大 ' + remain + '秒'
    );

    if(best.acc <= GOOD_ACC_M){
      finishWithBest(true);
    }
  }

  function handleError(err){
    lastError = err || lastError;
    if(finished) return;

    const remain = Math.max(0, Math.ceil((MAX_TOTAL_MS - elapsedMs()) / 1000));
    const bestAcc = best && Number.isFinite(best.acc) ? Number(best.acc).toFixed(1) : '-';
    setStatus('GPS測位中', '一時エラー: ' + errorText(err) + '\n最良 acc=' + bestAcc + 'm\n残り最大 ' + remain + '秒');
  }

  function startGetCurrentFallback(){
    try{
      navigator.geolocation.getCurrentPosition(
        pos => handleSample(pos, 'getCurrentPosition'),
        err => handleError(err),
        {
          enableHighAccuracy: true,
          timeout: GET_ONCE_TIMEOUT_MS,
          maximumAge: MAX_AGE_MS
        }
      );
    }catch(e){
      lastError = e;
    }
  }

  function start(){
    if(!('geolocation' in navigator)){
      returnToLog({ ok:false, error:'no_geolocation', error_message:'このブラウザでは位置情報を使えません。', bridge_version:VERSION });
      return;
    }

    finished = false;
    best = null;
    lastError = null;
    sampleCount = 0;
    startedAt = Date.now();

    if(retryBtn) retryBtn.style.display = 'none';
    if(backBtn) backBtn.style.display = 'none';

    setStatus('GPS測位開始', 'watchPositionで連続測位し、getCurrentPositionを補助で併用します。\n最大20秒で必ずログへ戻ります。');

    finishTimer = setTimeout(()=>finishWithBest(false), MAX_TOTAL_MS);

    try{
      watchId = navigator.geolocation.watchPosition(
        pos => handleSample(pos, 'watchPosition'),
        err => handleError(err),
        {
          enableHighAccuracy: true,
          timeout: MAX_TOTAL_MS,
          maximumAge: MAX_AGE_MS
        }
      );
    }catch(e){
      lastError = e;
    }

    setTimeout(startGetCurrentFallback, 500);
  }

  if(retryBtn){
    retryBtn.onclick = start;
  }

  start();
})();
</script>
</body>
</html>
