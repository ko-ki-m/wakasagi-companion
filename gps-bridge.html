<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="google" content="notranslate">
  <title>Wakasagi GPS Bridge</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#07111f;color:#f8fafc;}
    main{max-width:680px;margin:0 auto;padding:22px 16px;}
    .card{background:#0f172a;border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.25);}
    h1{font-size:22px;margin:0 0 10px;}
    p{line-height:1.65;color:#cbd5e1;}
    #status{font-size:16px;font-weight:700;color:#fff;margin:12px 0;}
    button{font-size:17px;font-weight:700;border:0;border-radius:14px;padding:14px 18px;background:#38bdf8;color:#00111c;width:100%;margin-top:12px;}
    pre{white-space:pre-wrap;word-break:break-word;background:#020617;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;color:#dbeafe;max-height:220px;overflow:auto;}
    .warn{color:#fbbf24;}.bad{color:#fb7185;}.good{color:#86efac;}
  </style>
</head>
<body>
<main>
  <div class="card">
    <h1>Wakasagi GPS Bridge</h1>
    <p>HTTPSでスマホGPSを取得し、Pico Wのログページへ戻します。地図表示用ページではありません。</p>
    <div id="status">準備中...</div>
    <button id="retry" type="button">GPSを取得して戻る</button>
    <pre id="debug"></pre>
  </div>
</main>
<script>
(function(){
  'use strict';

  const $ = id => document.getElementById(id);
  const status = $('status');
  const debug = $('debug');
  const retry = $('retry');

  function setStatus(text, cls){
    status.textContent = text;
    status.className = cls || '';
  }

  function param(name){
    return new URLSearchParams(location.search).get(name) || '';
  }

  function b64(obj){
    return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
  }

  function safeReturnUrl(){
    const u = param('return_url');
    if(!u) return '';
    try{
      const parsed = new URL(u, location.href);
      if(parsed.protocol !== 'http:' && parsed.protocol !== 'https:') return '';
      return parsed.href.split('#')[0];
    }catch(e){
      return '';
    }
  }

  function goBackWithPosition(pos){
    const c = pos.coords || {};
    const payload = {
      v:1,
      source:'github_gps_bridge_20260522a',
      sid:param('sid'),
      lat:Number(c.latitude),
      lng:Number(c.longitude),
      acc:Number(c.accuracy || 0),
      pos_ms:Number(pos.timestamp || Date.now()),
      t_ms:Date.now()
    };

    const returnUrl = safeReturnUrl();
    debug.textContent = JSON.stringify(payload, null, 2);

    if(!returnUrl){
      setStatus('戻り先URLがありません。', 'bad');
      return;
    }

    setStatus('Pico Wログへ戻ります...', 'good');
    location.href = returnUrl + '#gpsbridge=' + encodeURIComponent(b64(payload));
  }

  function requestGps(){
    if(!window.isSecureContext){
      setStatus('HTTPSではないためGPSを取得できません。', 'bad');
      return;
    }
    if(!('geolocation' in navigator)){
      setStatus('このブラウザはGPS取得に対応していません。', 'bad');
      return;
    }

    setStatus('スマホGPSを取得しています...', 'warn');
    navigator.geolocation.getCurrentPosition(
      goBackWithPosition,
      err => {
        setStatus('GPS取得失敗: ' + (err && err.message ? err.message : 'unknown'), 'bad');
      },
      {enableHighAccuracy:true, timeout:15000, maximumAge:5000}
    );
  }

  retry.addEventListener('click', requestGps);
  setTimeout(requestGps, 300);
})();
</script>
</body>
</html>
