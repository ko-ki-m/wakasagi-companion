<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Wakasagi GPS Bridge</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:24px;background:#f6f7f9;color:#111;}
  .card{max-width:560px;margin:0 auto;background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 14px rgba(0,0,0,.12);}
  h1{font-size:22px;margin:0 0 12px;}
  p{font-size:16px;line-height:1.5;margin:8px 0;}
  .big{font-size:28px;font-weight:700;margin:14px 0;}
  .muted{color:#666;font-size:13px;}
  button{font-size:18px;padding:12px 16px;margin:8px 6px 0 0;border-radius:12px;border:0;background:#111;color:#fff;}
  button.secondary{background:#666;}
  .ok{color:#087a2a;font-weight:700;}
  .warn{color:#b26a00;font-weight:700;}
  .err{color:#b00020;font-weight:700;}
</style>
</head>
<body>
<div class="card">
  <h1>GPS取得中</h1>
  <p>この画面を前面にしたまま、スマホの現在地を取得しています。</p>
  <p>取得後は自動でPico Wのログページへ戻ります。</p>
  <div id="acc" class="big">測位待ち...</div>
  <p id="state" class="muted">準備中</p>
  <button id="retry" style="display:none">もう一度取得</button>
  <button id="back" class="secondary" style="display:none">ログページへ戻る</button>
</div>
<script>
(() => {
  'use strict';

  const VERSION = 'gps-bridge-20260601b-front-auto-return-b64-getcurrent3';
  const TARGET_ACC_M = 8.0;
  const ACCEPT_ACC_M = 9.9;
  const MAX_ATTEMPTS = 3;
  const POSITION_TIMEOUT_MS = 4500;
  const RETRY_DELAY_MS = 300;
  const MAXIMUM_AGE_MS = 0;

  const $ = (id) => document.getElementById(id);
  const accEl = $('acc');
  const stateEl = $('state');
  const retryBtn = $('retry');
  const backBtn = $('back');

  const params = new URLSearchParams(location.search || '');
  let returned = false;
  let watchId = null;
  let best = null;
  let sampleCount = 0;
  const startedMs = Date.now();

  function setState(text, cls){
    stateEl.textContent = text;
    stateEl.className = cls ? cls : 'muted';
  }

  function readParamAny(names){
    for(const name of names){
      const v = params.get(name);
      if(v) return v;
    }
    const h = new URLSearchParams((location.hash || '').replace(/^#/,''));
    for(const name of names){
      const v = h.get(name);
      if(v) return v;
    }
    return '';
  }

  function readReturnUrl(){
    // .ino側 buildGpsBridgeUrl() は return_url を渡す。このキーを最優先で読む。
    const v = readParamAny(['return_url','return','returnUrl','back','u']);
    if(!v) return '';
    try{ return decodeURIComponent(v); }catch(e){ return v; }
  }

  const returnUrl = readReturnUrl();
  const reason = readParamAny(['reason','r']) || 'auto_log_start';
  const triggerSeq = readParamAny(['trigger_seq','seq']);
  const activityGapMs = readParamAny(['activity_gap_ms']);
  const activityCount = readParamAny(['activity_count']);

  function stopWatch(){
    if(watchId !== null){
      try{ navigator.geolocation.clearWatch(watchId); }catch(e){}
      watchId = null;
    }
  }

  function updateBest(pos){
    if(returned || !pos || !pos.coords) return;
    const lat = Number(pos.coords.latitude);
    const lng = Number(pos.coords.longitude);
    const acc = Number(pos.coords.accuracy);
    if(!Number.isFinite(lat) || !Number.isFinite(lng) || !Number.isFinite(acc)) return;

    sampleCount++;
    const item = {
      lat:lat,
      lng:lng,
      acc:acc,
      pos_ms:Number(pos.timestamp || Date.now()),
      received_ms:Date.now()
    };
    if(!best || item.acc < best.acc) best = item;

    accEl.textContent = 'acc=' + item.acc.toFixed(1) + 'm';
    accEl.className = item.acc <= ACCEPT_ACC_M ? 'big ok' : 'big warn';
    setState('sample=' + sampleCount + ' / best=' + best.acc.toFixed(1) + 'm / elapsed=' + (Date.now()-startedMs) + 'ms', 'muted');

    if(best.acc <= ACCEPT_ACC_M){
      returnToLog('accepted');
    }
  }

  function buildPayload(ok, status){
    const elapsedMs = Date.now() - startedMs;
    const p = {
      ok:ok ? 1 : 0,
      source:'github_gps_bridge',
      reason:reason,
      bridge_version:VERSION,
      method:'front_auto_getcurrent_3',
      target_acc_m:String(TARGET_ACC_M),
      accept_acc_m:String(ACCEPT_ACC_M),
      timeout_ms:String(POSITION_TIMEOUT_MS),
      maximum_age_ms:String(MAXIMUM_AGE_MS),
      elapsed_ms:String(elapsedMs),
      sample_count:String(sampleCount),
      attempts:String(sampleCount),
      status:String(status || ''),
      target_met:(best && best.acc <= TARGET_ACC_M) ? '1' : '0',
      accepted:(best && best.acc <= ACCEPT_ACC_M) ? '1' : '0'
    };
    if(triggerSeq) p.trigger_seq = triggerSeq;
    if(activityGapMs) p.activity_gap_ms = activityGapMs;
    if(activityCount) p.activity_count = activityCount;
    if(best){
      p.lat = best.lat.toFixed(7);
      p.lng = best.lng.toFixed(7);
      p.acc = best.acc.toFixed(1);
      p.pos_ms = String(best.pos_ms);
      p.received_ms = String(best.received_ms);
    }
    return p;
  }

  function encodePayload(obj){
    try{
      const json = JSON.stringify(obj);
      const utf8 = unescape(encodeURIComponent(json));
      return encodeURIComponent(btoa(utf8));
    }catch(e){
      try{ return encodeURIComponent(btoa(JSON.stringify(obj))); }catch(e2){ return ''; }
    }
  }

  function appendGpsBridgeHash(url, payload){
    const sep = url.indexOf('#') >= 0 ? '&' : '#';
    return url + sep + 'gpsbridge=' + encodePayload(payload);
  }

  function returnToLog(status){
    if(returned) return;
    returned = true;
    stopWatch();

    const payload = buildPayload(!!best, status || (best ? 'best' : 'no_position'));
    if(best){
      setState('ログページへ戻ります best=' + best.acc.toFixed(1) + 'm', best.acc <= ACCEPT_ACC_M ? 'ok' : 'warn');
    }else{
      accEl.textContent = 'GPS取得失敗';
      accEl.className = 'big err';
      setState('GPS値が取れませんでした。ログページへ戻ります。', 'err');
    }

    if(returnUrl){
      location.replace(appendGpsBridgeHash(returnUrl, payload));
      return;
    }

    // return_url が無い異常時だけ手動ボタンを表示する。
    retryBtn.style.display = '';
    backBtn.style.display = '';
    setState('return_urlが無いため自動復帰できません。', 'err');
  }

  function start(){
    if(!returnUrl){
      setState('return_urlがありません。/logから開き直してください。', 'err');
    }
    if(!('geolocation' in navigator)){
      returnToLog('geolocation_not_available');
      return;
    }

    returned = false;
    best = null;
    sampleCount = 0;
    retryBtn.style.display = 'none';
    backBtn.style.display = 'none';
    accEl.textContent = '測位待ち...';
    accEl.className = 'big';
    setState('GPS Bridgeを前面で開始しました。取得後は自動でログページへ戻ります。', 'muted');

    const opt = {
      enableHighAccuracy:true,
      maximumAge:MAXIMUM_AGE_MS,
      timeout:POSITION_TIMEOUT_MS
    };

    const runAttempt = (attemptNo) => {
      if(returned) return;
      if(attemptNo > MAX_ATTEMPTS){
        returnToLog(best ? 'three_attempts_best' : 'three_attempts_no_position');
        return;
      }
      setState('GPS取得 ' + attemptNo + '/' + MAX_ATTEMPTS, 'muted');
      try{
        navigator.geolocation.getCurrentPosition((pos) => {
          updateBest(pos);
          if(returned) return;
          if(best && best.acc <= ACCEPT_ACC_M) return;
          setTimeout(() => runAttempt(attemptNo + 1), RETRY_DELAY_MS);
        }, (err) => {
          if(returned) return;
          setState('GPS取得 ' + attemptNo + '/' + MAX_ATTEMPTS + ' code=' + (err && err.code ? err.code : ''), 'muted');
          setTimeout(() => runAttempt(attemptNo + 1), RETRY_DELAY_MS);
        }, opt);
      }catch(e){
        setTimeout(() => runAttempt(attemptNo + 1), RETRY_DELAY_MS);
      }
    };

    runAttempt(1);
  }

  retryBtn.addEventListener('click', () => location.reload());
  backBtn.addEventListener('click', () => {
    if(returnUrl){
      location.replace(appendGpsBridgeHash(returnUrl, buildPayload(!!best, 'manual_back')));
    }else{
      history.back();
    }
  });

  start();
})();
</script>
</body>
</html>
