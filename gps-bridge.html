<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GPS取得中</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f7f7f7;color:#111;}
    main{max-width:560px;margin:0 auto;padding:22px 16px;}
    .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
    h1{font-size:24px;margin:0 0 12px;}
    .lead{font-size:18px;font-weight:700;margin:10px 0;}
    #status{font-size:20px;font-weight:700;margin:16px 0;color:#0b63c7;}
    #detail{font-size:15px;line-height:1.55;white-space:pre-wrap;color:#333;}
    button{font-size:18px;font-weight:700;padding:12px 16px;margin:8px 8px 0 0;border:0;border-radius:10px;background:#0b63c7;color:#fff;}
    button.secondary{background:#555;}
  </style>
</head>
<body>
<main>
  <div class="card">
    <h1>GPS取得中</h1>
    <div class="lead">本体操作を最優先します</div>
    <div id="status">準備中</div>
    <div id="detail">この画面を前面にしたまま、スマホの現在地を取得しています。取得後は自動でPico Wのログページへ戻ります。</div>
    <button id="retry" type="button">もう一度取得</button>
    <button id="back" type="button" class="secondary">ログページへ戻る</button>
  </div>
</main>
<script>
(function(){
  'use strict';

  const BRIDGE_VERSION = 'gps_bridge_restore_20260622a';
  const qs = new URLSearchParams(location.search || '');
  const pico = String(qs.get('pico') || '').trim();
  const returnUrl = String(qs.get('return_url') || '').trim();
  const sid = String(qs.get('sid') || '').trim();
  const reason = String(qs.get('reason') || 'gps_bridge').trim();
  const triggerSeq = String(qs.get('trigger_seq') || '').trim();
  const triggerTms = String(qs.get('trigger_t_ms') || '').trim();
  const activityGapMs = String(qs.get('activity_gap_ms') || '').trim();
  const activityCount = String(qs.get('activity_count') || '').trim();

  const elStatus = document.getElementById('status');
  const elDetail = document.getElementById('detail');
  const btnRetry = document.getElementById('retry');
  const btnBack = document.getElementById('back');

  let running = false;

  function setStatus(s, d){
    if(elStatus) elStatus.textContent = s;
    if(elDetail && d) elDetail.textContent = d;
  }

  function safeReturnBase(){
    if(returnUrl) return returnUrl;
    if(pico) return pico.replace(/\/+$/,'') + '/log';
    return '';
  }

  function buildBodyguardUrl(){
    try{
      if(!pico) return '';
      return new URL('/api/bodyguard', pico).href;
    }catch(e){
      return '';
    }
  }

  async function fetchBodyguardOnce(){
    const url = buildBodyguardUrl();
    if(!url) return null;

    const ctl = new AbortController();
    const tid = setTimeout(function(){ try{ ctl.abort(); }catch(e){} }, 1200);
    try{
      const r = await fetch(url + '?t=' + encodeURIComponent(String(Date.now())), {
        method:'GET',
        cache:'no-store',
        signal: ctl.signal
      });
      if(!r || !r.ok) return null;
      return await r.json();
    }catch(e){
      return null;
    }finally{
      clearTimeout(tid);
    }
  }

  function isBusy(bg){
    if(!bg) return false;
    return Number(bg.busy || 0) !== 0 ||
           Number(bg.motor || 0) !== 0 ||
           Number(bg.req || 0) !== 0 ||
           Number(bg.sasoi || 0) !== 0 ||
           Number(bg.input || 0) !== 0;
  }

  async function waitBodyQuiet(label, maxMs){
    const start = Date.now();
    let quietStart = 0;

    while((Date.now() - start) < maxMs){
      const bg = await fetchBodyguardOnce();

      // bodyguard未実装・CORS不可・通信不可の場合はBridgeを閉じ込めない。
      if(!bg){
        return true;
      }

      if(isBusy(bg)){
        quietStart = 0;
        setStatus(label + ': 本体操作待ち', '本体操作中はGPS取得またはログページ復帰を待ちます。');
        await new Promise(r => setTimeout(r, 700));
        continue;
      }

      if(!quietStart) quietStart = Date.now();
      if((Date.now() - quietStart) >= 1200) return true;
      await new Promise(r => setTimeout(r, 300));
    }

    // 永久にBridgeへ閉じ込めない。
    return true;
  }

  function makePayload(extra){
    const p = Object.assign({
      ok: false,
      source: 'github_gps_bridge',
      bridge_version: BRIDGE_VERSION,
      sid: sid,
      reason: reason,
      trigger_seq: triggerSeq,
      trigger_t_ms: triggerTms,
      activity_gap_ms: activityGapMs,
      activity_count: activityCount,
      t_ms: Date.now()
    }, extra || {});
    return p;
  }

  function returnToLog(payload){
    const base = safeReturnBase();
    if(!base){
      setStatus('ログページへ戻れません', 'return_url または pico がありません。');
      return;
    }
    const raw = encodeURIComponent(JSON.stringify(payload || makePayload({ok:false,error:'empty_payload'})));
    location.replace(base + '#gpsbridge=' + raw);
  }

  function returnError(reasonText, detailText){
    const p = makePayload({
      ok:false,
      error:String(reasonText || 'gps_error'),
      message:String(detailText || ''),
      lat:'',
      lng:'',
      acc:0,
      pos_ms:Date.now()
    });
    returnToLog(p);
  }

  function getPositionOnce(){
    return new Promise(function(resolve, reject){
      if(!navigator.geolocation){
        reject(new Error('geolocation_not_supported'));
        return;
      }
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
      });
    });
  }

  async function run(){
    if(running) return;
    running = true;

    try{
      setStatus('本体状態確認中', '本体操作中ならGPS取得を待ちます。');
      await waitBodyQuiet('GPS取得前', 20000);

      setStatus('GPS取得中', 'スマホの現在地を1回だけ取得しています。');
      const pos = await getPositionOnce();
      const c = pos && pos.coords ? pos.coords : {};
      const lat = Number(c.latitude);
      const lng = Number(c.longitude);
      const acc = Number(c.accuracy || 0);

      if(!Number.isFinite(lat) || !Number.isFinite(lng)){
        setStatus('GPS値不正', 'ログページへ戻します。');
        returnError('invalid_position', 'lat/lng is not finite');
        return;
      }

      setStatus('ログページ復帰待ち', '本体操作中なら/log復帰を待ちます。');
      await waitBodyQuiet('ログ復帰前', 20000);

      returnToLog(makePayload({
        ok:true,
        lat:lat,
        lng:lng,
        acc:Number.isFinite(acc) ? acc : 0,
        pos_ms:Number(pos.timestamp || Date.now()),
        t_ms:Date.now()
      }));
    }catch(e){
      setStatus('GPS取得失敗', 'ログページへ戻します。');
      returnError('geolocation_error', e && e.message ? e.message : String(e));
    }finally{
      running = false;
    }
  }

  if(btnRetry){
    btnRetry.addEventListener('click', function(ev){
      ev.preventDefault();
      run();
    });
  }

  if(btnBack){
    btnBack.addEventListener('click', function(ev){
      ev.preventDefault();
      returnError('manual_back', 'user returned without gps');
    });
  }

  run();
})();
</script>
</body>
</html>
