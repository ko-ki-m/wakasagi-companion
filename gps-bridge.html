<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Wakasagi GPS Bridge</title>
  <style>
  body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f7f7f7;color:#111;}
  main{max-width:560px;margin:0 auto;padding:22px 16px;}
  .card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
  h1{font-size:20px;margin:0 0 10px;}
  #status{font-size:16px;font-weight:700;line-height:1.6;}
  #detail{font-size:13px;line-height:1.7;margin-top:8px;color:#444;white-space:pre-line;}
  button{font-size:16px;padding:12px 14px;border-radius:10px;border:1px solid #bbb;background:#fff;margin-top:14px;}
  </style>
</head>
<body>
<main>
  <div class="card">
  <h1>GPS取得中</h1>
  <div id="status">スマホの現在地を1回だけ高精度取得しています。</div>
  <div id="detail">一桁精度を目標に取得し、取得後は自動でPico Wのログページへ戻ります。</div>
  <button id="retry" type="button" style="display:none;">もう一度取得</button>
  <button id="back" type="button" style="display:none;">ログページへ戻る</button>
  </div>
</main>
<script>
(function(){
  'use strict';
  const VERSION = 'gps-bridge-20260529p-one-digit';
  const TARGET_ACC_M = 8.0;
  const ACCEPT_ACC_M = 9.9;
  const MAX_ATTEMPTS = 8;
  const POSITION_TIMEOUT_MS = 20000;
  const RETRY_DELAY_MS = 1200;
  const $ = (id)=>document.getElementById(id);
  const statusEl = $('status');
  const detailEl = $('detail');
  const retryBtn = $('retry');
  const backBtn = $('back');

  function qs(name){
  try{ return new URL(location.href).searchParams.get(name) || ''; }
  catch(e){ return ''; }
  }

  function setStatus(s,d){
  if(statusEl) statusEl.textContent = s || '';
  if(detailEl) detailEl.textContent = d || '';
  }

  function sleep(ms){
  return new Promise(resolve=>setTimeout(resolve, ms));
  }

  function b64Json(obj){
  const json = JSON.stringify(obj || {});
  const bytes = new TextEncoder().encode(json);
  let bin = '';
  for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
  }

  function normalizeReturnUrl(){
  const rawReturn = qs('return_url');
  const pico = qs('pico');
  let ret = rawReturn || '';
  if(!ret && pico){
  ret = String(pico).replace(/\/+$/,'') + '/log';
  }
  if(!ret){
  ret = '/';
  }
  try{
  const u = new URL(ret, location.href);
  u.hash = '';
  return u.toString();
  }catch(e){
  return ret.split('#')[0];
  }
  }

  const returnUrl = normalizeReturnUrl();
  const sid = qs('sid');
  const reqT = qs('t');
  const reason = qs('reason') || 'gps_bridge';
  const triggerSeq = qs('trigger_seq');
  const triggerTms = qs('trigger_t_ms');
  const activityGapMs = qs('activity_gap_ms');
  const activityCount = qs('activity_count');

  function returnToLog(payload){
  const p = Object.assign({
  v: 1,
  source: 'github_gps_bridge',
  bridge_version: VERSION,
  sid: sid,
  reason: reason,
  req_t: reqT,
  trigger_seq: triggerSeq,
  trigger_t_ms: triggerTms,
  activity_gap_ms: activityGapMs,
  activity_count: activityCount,
  bridge_ms: Date.now()
  }, payload || {});
  location.href = returnUrl.split('#')[0] + '#gpsbridge=' + encodeURIComponent(b64Json(p));
  }

  function showReturnOnly(msg, detail){
  setStatus(msg || 'GPS取得に失敗しました', detail || 'ログページへ戻ります。');
  if(backBtn){
  backBtn.style.display = '';
  backBtn.onclick = function(){
  returnToLog({ ok:false, error:'manual_return', error_message: msg || '' });
  };
  }
  }

  function posToPlain(pos){
  const c = pos && pos.coords ? pos.coords : {};
  return {
  lat: Number(c.latitude),
  lng: Number(c.longitude),
  acc: Number(c.accuracy || 0),
  pos_ms: Number(pos && pos.timestamp ? pos.timestamp : Date.now())
  };
  }

  function validPlain(p){
  return !!p && Number.isFinite(p.lat) && Number.isFinite(p.lng) && Number.isFinite(p.acc) && p.acc > 0;
  }

  function getPositionOnce(){
  return new Promise((resolve, reject)=>{
  navigator.geolocation.getCurrentPosition(resolve, reject, {
  enableHighAccuracy: true,
  timeout: POSITION_TIMEOUT_MS,
  maximumAge: 0
  });
  });
  }

  async function getBestPosition(){
  let best = null;
  let lastError = null;
  for(let attempt=1; attempt<=MAX_ATTEMPTS; attempt++){
  setStatus('GPS取得中', '一桁精度を目標に取得しています。\n試行 ' + attempt + ' / ' + MAX_ATTEMPTS + '\n採用条件 acc <= ' + ACCEPT_ACC_M + 'm');
  try{
  const pos = await getPositionOnce();
  const p = posToPlain(pos);
  if(validPlain(p)){
  if(!best || p.acc < best.acc){
  best = Object.assign({attempt:attempt}, p);
  }
  const accText = Number.isFinite(p.acc) ? p.acc.toFixed(1) : '-';
  const bestText = best && Number.isFinite(best.acc) ? best.acc.toFixed(1) : '-';
  setStatus('GPS取得中', '試行 ' + attempt + ' / ' + MAX_ATTEMPTS + '\n今回 acc=' + accText + 'm\n最良 acc=' + bestText + 'm');
  if(p.acc <= TARGET_ACC_M || best.acc <= ACCEPT_ACC_M){
  return {best:best, attempts:attempt, target_met:(best.acc <= TARGET_ACC_M), accepted:(best.acc <= ACCEPT_ACC_M), last_error:null};
  }
  }
  }catch(err){
  lastError = err || null;
  }
  if(attempt < MAX_ATTEMPTS) await sleep(RETRY_DELAY_MS);
  }
  return {best:best, attempts:MAX_ATTEMPTS, target_met:false, accepted:!!(best && best.acc <= ACCEPT_ACC_M), last_error:lastError};
  }

  async function start(){
  if(!('geolocation' in navigator)){
  returnToLog({ ok:false, error:'no_geolocation', error_message:'このブラウザでは位置情報を使えません。', bridge_version:VERSION });
  return;
  }
  if(retryBtn) retryBtn.style.display = 'none';
  if(backBtn) backBtn.style.display = 'none';
  try{
  const result = await getBestPosition();
  const best = result.best;
  if(!validPlain(best)){
  const err = result.last_error || {};
  returnToLog({
  ok:false,
  error:'geolocation_error',
  code: Number(err.code || 0),
  error_message: String(err.message || 'position unavailable'),
  attempts: result.attempts,
  target_acc_m: TARGET_ACC_M,
  accept_acc_m: ACCEPT_ACC_M,
  timeout_ms: POSITION_TIMEOUT_MS,
  maximum_age_ms: 0,
  t_ms: Date.now()
  });
  return;
  }
  const accText = Number.isFinite(best.acc) ? best.acc.toFixed(1) : '-';
  setStatus(result.accepted ? 'GPS取得成功' : 'GPS精度不足', '採用候補 acc=' + accText + 'm\nログページへ戻ります。');
  /*
  accが一桁台でなくても、緯度経度とaccは返す。
  .ino側の GPS_CAND_MAX_ACC_M で保存拒否し、/logに「精度不足」を表示させる。
  これにより粗い座標で誤ピンを作らない。
  */
  returnToLog({
  ok: true,
  lat: best.lat,
  lng: best.lng,
  acc: Number.isFinite(best.acc) ? best.acc : 0,
  pos_ms: Number(best.pos_ms || Date.now()),
  t_ms: Date.now(),
  attempts: Number(result.attempts || 1),
  target_acc_m: TARGET_ACC_M,
  accept_acc_m: ACCEPT_ACC_M,
  target_met: !!result.target_met,
  accepted: !!result.accepted,
  timeout_ms: POSITION_TIMEOUT_MS,
  maximum_age_ms: 0
  });
  }catch(e){
  returnToLog({ ok:false, error:'bridge_exception', error_message:String(e && e.message ? e.message : e), t_ms:Date.now() });
  }
  }

  if(retryBtn){
  retryBtn.onclick = start;
  }
  start();
})();
</script>
</body>
</html>
