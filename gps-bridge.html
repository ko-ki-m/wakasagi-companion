<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Wakasagi GPS Bridge</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:18px;line-height:1.55;background:#f7f7f7;color:#111;}
    .card{background:white;border-radius:14px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.10);max-width:680px;margin:0 auto;}
    button{font-size:18px;padding:12px 14px;border-radius:10px;border:1px solid #aaa;background:#fff;margin:8px 0;width:100%;}
    pre{white-space:pre-wrap;background:#111;color:#eee;padding:10px;border-radius:10px;overflow:auto;font-size:12px;}
    .small{font-size:13px;opacity:.75;}
    .ok{color:#075e2b;font-weight:700}.ng{color:#a40000;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <h1>Wakasagi GPS Bridge</h1>
    <p>HTTPSでスマホGPSを取得し、Pico Wの <code>/log</code> へ戻します。</p>
    <p>取得したGPSは、従来の <code>#gpsbridge</code> 返却に加えて、スマホ側GPS候補DBにも「候補」として保存します。GPSだけではMap履歴へ保存しません。</p>
    <p id="state">準備中...</p>
    <button id="btn">GPSを取得して戻る</button>
    <p class="small">自動取得に失敗した場合は、このボタンを1回押してください。</p>
    <pre id="debug">-</pre>
  </div>

  <script src="./gps_session_candidates_core.js?v=20260527i" defer></script>
  <script>
  (function(){
    'use strict';
    const VERSION = 'gps_bridge_20260527i_candidate_db_mirror';
    const $ = id => document.getElementById(id);
    function setState(s, cls){ const el=$('state'); if(el){ el.textContent=s; el.className=cls||''; } }
    function debug(o){ try{ $('debug').textContent = JSON.stringify(o,null,2); }catch(e){} }
    function q(name){ try{ return new URL(location.href).searchParams.get(name) || ''; }catch(e){ return ''; } }
    function s(v){ return String(v == null ? '' : v).trim(); }
    function n(v){ const x=Number(v); return Number.isFinite(x)?x:null; }
    function b64(obj){ return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
    function returnUrl(){ return s(q('return_url')) || s(q('return')) || ''; }
    function sid(){ return s(q('sid')) || 'nosid'; }
    function makePayload(pos){
      const c = pos && pos.coords ? pos.coords : {};
      return {
        source:'github_gps_bridge',
        bridge_version:VERSION,
        sid:sid(),
        lat:n(c.latitude),
        lng:n(c.longitude),
        acc:n(c.accuracy),
        pos_ms:n(pos && pos.timestamp) || Date.now(),
        t_ms:Date.now()
      };
    }
    async function saveCandidate(payload){
      try{
        const core = window.wakasagiGpsCandidatesCore;
        if(!core || typeof core.saveFix !== 'function') return {ok:false, reason:'core_not_ready'};
        if(!payload || !Number.isFinite(payload.lat) || !Number.isFinite(payload.lng)) return {ok:false, reason:'bad_lat_lng'};
        return await core.saveFix(payload.sid || sid(), {
          lat:payload.lat,
          lng:payload.lng,
          acc_m:payload.acc,
          gps_ms:payload.pos_ms
        }, 'gps_bridge_return_candidate');
      }catch(e){
        return {ok:false, reason:e && e.message ? e.message : String(e)};
      }
    }
    function goBack(payload){
      const ru = returnUrl();
      if(!ru){
        setState('return_urlがありません。/logから開いてください。','ng');
        debug({version:VERSION, payload, error:'missing_return_url'});
        return;
      }
      const sep = ru.indexOf('#') >= 0 ? ru.substring(0, ru.indexOf('#')) : ru;
      location.href = sep + '#gpsbridge=' + encodeURIComponent(b64(payload));
    }
    function getPosition(){
      return new Promise((resolve,reject)=>{
        if(!window.isSecureContext || !navigator.geolocation){ reject(new Error('secure geolocation unavailable')); return; }
        navigator.geolocation.getCurrentPosition(resolve, reject, {enableHighAccuracy:false, timeout:8000, maximumAge:120000});
      });
    }
    async function run(){
      setState('GPS取得中...');
      debug({version:VERSION, sid:sid(), return_url:returnUrl(), secure_context:!!window.isSecureContext});
      try{
        const pos = await getPosition();
        const payload = makePayload(pos);
        const saved = await saveCandidate(payload);
        setState(saved && saved.ok ? 'GPS候補保存済み。/logへ戻ります...' : 'GPS取得済み。/logへ戻ります...', saved && saved.ok ? 'ok' : '');
        debug({version:VERSION, payload, candidate_save:saved});
        setTimeout(()=>goBack(payload), 250);
      }catch(e){
        setState('GPS取得失敗: ' + (e && e.message ? e.message : e), 'ng');
        debug({version:VERSION, error:e && e.message ? e.message : String(e)});
      }
    }
    function init(){
      const btn=$('btn'); if(btn) btn.onclick=run;
      setState('GPS取得準備完了');
      setTimeout(run, 300);
    }
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, {once:true}); else init();
  })();
  </script>
</body>
</html>
