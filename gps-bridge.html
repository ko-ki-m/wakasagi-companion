<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Wakasagi GPS Bridge</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f7f7f7;color:#111;}
    main{max-width:560px;margin:0 auto;padding:22px 16px;}
    .card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
    h1{font-size:20px;margin:0 0 10px;}
    #status{font-size:16px;font-weight:700;line-height:1.6;}
    #detail{font-size:13px;line-height:1.7;margin-top:8px;color:#444;}
    button{font-size:16px;padding:12px 14px;border-radius:10px;border:1px solid #bbb;background:#fff;margin-top:14px;}
  </style>
</head>
<body>
<main>
  <div class="card">
    <h1>GPS取得中</h1>
    <div id="status">スマホの現在地を1回だけ取得しています。</div>
    <div id="detail">取得後、自動でPico Wのログページへ戻ります。</div>
    <button id="retry" type="button" style="display:none;">もう一度取得</button>
    <button id="back" type="button" style="display:none;">ログページへ戻る</button>
  </div>
</main>
<script>
(function(){
  'use strict';

  const $ = (id)=>document.getElementById(id);
  const statusEl = $('status');
  const detailEl = $('detail');
  const retryBtn = $('retry');
  const backBtn = $('back');

  function qs(name){
    try{ return new URL(location.href).searchParams.get(name) || ''; }
    catch(e){ return ''; }
  }

  function setStatus(s,d){
    if(statusEl) statusEl.textContent = s || '';
    if(detailEl) detailEl.textContent = d || '';
  }

  function b64Json(obj){
    const json = JSON.stringify(obj || {});
    const bytes = new TextEncoder().encode(json);
    let bin = '';
    for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }

  function normalizeReturnUrl(){
    const rawReturn = qs('return_url');
    const pico = qs('pico');
    let ret = rawReturn || '';

    if(!ret && pico){
      ret = String(pico).replace(/\/+$/,'') + '/log';
    }
    if(!ret){
      ret = '/';
    }

    // return_url は /log 側のURLとして扱う。既存hashは破棄し、gpsbridgeで戻す。
    try{
      const u = new URL(ret, location.href);
      u.hash = '';
      return u.toString();
    }catch(e){
      return ret.split('#')[0];
    }
  }

  const returnUrl = normalizeReturnUrl();
  const sid = qs('sid');
  const reqT = qs('t');
  const reason = qs('reason') || 'gps_bridge';

  function returnToLog(payload){
    const p = Object.assign({
      v: 1,
      source: 'github_gps_bridge',
      sid: sid,
      reason: reason,
      req_t: reqT,
      bridge_ms: Date.now()
    }, payload || {});
    const sep = returnUrl.indexOf('#') >= 0 ? '' : '#gpsbridge=';
    location.href = returnUrl.split('#')[0] + sep + encodeURIComponent(b64Json(p));
  }

  function showReturnOnly(msg, detail){
    setStatus(msg || 'GPS取得に失敗しました', detail || 'ログページへ戻ります。');
    if(backBtn){
      backBtn.style.display = '';
      backBtn.onclick = function(){
        returnToLog({ ok:false, error:'manual_return', error_message: msg || '' });
      };
    }
  }

  function start(){
    if(!('geolocation' in navigator)){
      returnToLog({ ok:false, error:'no_geolocation', error_message:'このブラウザでは位置情報を使えません。' });
      return;
    }

    setStatus('GPS取得中', '許可を求められた場合は位置情報を許可してください。');
    if(retryBtn) retryBtn.style.display = 'none';
    if(backBtn) backBtn.style.display = 'none';

    navigator.geolocation.getCurrentPosition(function(pos){
      const c = pos && pos.coords ? pos.coords : {};
      const lat = Number(c.latitude);
      const lng = Number(c.longitude);
      const acc = Number(c.accuracy || 0);
      if(!Number.isFinite(lat) || !Number.isFinite(lng)){
        returnToLog({ ok:false, error:'invalid_position', error_message:'位置情報の値が不正です。' });
        return;
      }
      setStatus('GPS取得成功', 'ログページへ戻ります。');
      returnToLog({
        ok: true,
        lat: lat,
        lng: lng,
        acc: Number.isFinite(acc) ? acc : 0,
        pos_ms: Number(pos.timestamp || Date.now()),
        t_ms: Date.now()
      });
    }, function(err){
      const code = err && err.code ? err.code : 0;
      const msg = err && err.message ? err.message : 'unknown';
      setStatus('GPS取得失敗', msg + ' / ログページへ戻ります。');
      setTimeout(function(){
        returnToLog({ ok:false, error:'geolocation_error', code:code, error_message:msg, t_ms:Date.now() });
      }, 700);
    }, {
      enableHighAccuracy: true,
      timeout: 9000,
      maximumAge: 30000
    });
  }

  if(retryBtn){
    retryBtn.onclick = start;
  }

  start();
})();
</script>
</body>
</html>
