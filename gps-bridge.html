<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store">
<title>Wakasagi GPS Bridge v8</title>
<style>
:root{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#0f172a;background:#f8fafc;}
body{margin:0;padding:18px;}
.card{max-width:560px;margin:0 auto;background:#fff;border:1px solid #dbeafe;border-radius:18px;box-shadow:0 10px 30px rgba(15,23,42,.12);padding:18px;}
h1{font-size:24px;margin:0 0 10px;}
.big{font-size:20px;font-weight:700;margin:12px 0;color:#0f172a;}
.status{font-size:18px;line-height:1.45;background:#eff6ff;border:1px solid #bfdbfe;border-radius:14px;padding:12px;margin:12px 0;}
.small{font-size:13px;line-height:1.55;color:#475569;white-space:pre-wrap;}
.warn{background:#fff7ed;border-color:#fed7aa;}
.ok{background:#ecfdf5;border-color:#a7f3d0;}
.err{background:#fef2f2;border-color:#fecaca;}
button{font-size:18px;padding:12px 16px;border-radius:12px;border:1px solid #93c5fd;background:#dbeafe;color:#0f172a;margin:6px 4px 0 0;}
button.primary{background:#2563eb;color:#fff;border-color:#2563eb;}
</style>
</head>
<body>
<div class="card">
  <h1>GPS取得中</h1>
  <div class="big">本体操作を最優先します</div>
  <div id="status" class="status">準備中</div>
  <div id="detail" class="small">読み込み中</div>
  <div style="margin-top:12px;">
    <button class="primary" id="retryBtn" type="button">もう一度取得</button>
    <button id="backBtn" type="button">ログページへ戻る</button>
  </div>
</div>

<script>
'use strict';

const BRIDGE_VERSION = 'v8-watch-best-20260607c';
const TARGET_ACC_M = 8.0;
const ACCEPT_ACC_M = 9.9;
const MAX_WAIT_MS = 9000;
const MIN_SAMPLE_WAIT_MS = 1200;
const GPS_MAXIMUM_AGE_MS = 0;

const $ = (id)=>document.getElementById(id);
const statusEl = $('status');
const detailEl = $('detail');
const retryBtn = $('retryBtn');
const backBtn = $('backBtn');

const qs = new URLSearchParams(location.search || '');
const pico = String(qs.get('pico') || '').replace(/\/+$/,'');
const returnUrl = String(qs.get('return_url') || '');
const sid = String(qs.get('sid') || '');
const reason = String(qs.get('reason') || 'gps_bridge');
const triggerSeq = Number(qs.get('trigger_seq') || 0) || 0;
const triggerTms = Number(qs.get('trigger_t_ms') || 0) || 0;
const activityGapMs = Number(qs.get('activity_gap_ms') || 0) || 0;
const activityCount = Number(qs.get('activity_count') || 0) || 0;

let runId = 0;
let returned = false;
let watchId = null;
let hardTimer = 0;
let best = null;
let samples = 0;
let startedMs = 0;

function setStatus(text, cls){
  statusEl.textContent = text;
  statusEl.className = 'status ' + (cls || '');
}
function setDetail(text){
  detailEl.textContent = text;
}
function stopGps(){
  if(watchId !== null){
    try{ navigator.geolocation.clearWatch(watchId); }catch(e){}
    watchId = null;
  }
  if(hardTimer){
    clearTimeout(hardTimer);
    hardTimer = 0;
  }
}
function encodePayload(obj){
  const json = JSON.stringify(obj);
  try{
    if(window.TextEncoder){
      const bytes = new TextEncoder().encode(json);
      let bin = '';
      for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin);
    }
  }catch(e){}
  return btoa(unescape(encodeURIComponent(json)));
}
function appendGpsBridgeHash(url, payload){
  const sep = url.indexOf('#') >= 0 ? '&' : '#';
  return url + sep + 'gpsbridge=' + encodeURIComponent(encodePayload(payload));
}
function returnToLogImmediate(payload){
  if(returned) return;
  returned = true;
  stopGps();

  if(!returnUrl){
    setStatus('戻り先がありません', 'warn');
    setDetail(JSON.stringify(payload, null, 2));
    retryBtn.style.display = '';
    backBtn.style.display = '';
    return;
  }

  location.href = appendGpsBridgeHash(returnUrl, payload);
}
function makePayload(ok, status, extra){
  const elapsedMs = Date.now() - startedMs;
  const p = {
    ok: ok ? 1 : 0,
    source:'github_gps_bridge',
    sid:sid,
    reason:reason,
    status:String(status || ''),
    bridge_version:BRIDGE_VERSION,
    method:'front_watch_best',
    target_acc_m:String(TARGET_ACC_M),
    accept_acc_m:String(ACCEPT_ACC_M),
    timeout_ms:String(MAX_WAIT_MS),
    maximum_age_ms:String(GPS_MAXIMUM_AGE_MS),
    elapsed_ms:String(elapsedMs),
    sample_count:String(samples),
    attempts:String(samples),
    trigger_seq:triggerSeq,
    trigger_t_ms:triggerTms,
    activity_gap_ms:activityGapMs,
    activity_count:activityCount,
    t_ms:Date.now()
  };

  if(best){
    p.lat = Number(best.lat);
    p.lng = Number(best.lng);
    p.acc = Number(best.acc);
    p.pos_ms = Number(best.pos_ms || Date.now());
    p.received_ms = Number(best.received_ms || Date.now());
    p.target_met = best.acc <= TARGET_ACC_M ? '1' : '0';
    p.accepted = best.acc <= ACCEPT_ACC_M ? '1' : '0';
  }else{
    p.target_met = '0';
    p.accepted = '0';
  }

  if(extra && typeof extra === 'object'){
    for(const k of Object.keys(extra)) p[k] = extra[k];
  }

  return p;
}
function manualBack(){
  returnToLogImmediate(makePayload(false, 'manual_back', {error:'manual_back'}));
}
function finishWithBest(status){
  if(best){
    const cls = best.acc <= ACCEPT_ACC_M ? 'ok' : 'warn';
    setStatus('ログページへ戻ります acc=' + Number(best.acc).toFixed(1) + 'm', cls);
    setDetail('取得サンプル数=' + samples + '\n読み込み版: ' + BRIDGE_VERSION);
    returnToLogImmediate(makePayload(true, status || 'best'));
    return;
  }

  setStatus('GPS座標が取れません', 'err');
  setDetail(
    '座標サンプルが0件です。\n' +
    'スマホの位置情報許可、ブラウザの位置情報許可、屋外/窓際、モバイル通信状態を確認してください。\n' +
    '読み込み版: ' + BRIDGE_VERSION
  );
  retryBtn.style.display = '';
  backBtn.style.display = '';
}
function updateBest(pos){
  if(returned || !pos || !pos.coords) return;

  const lat = Number(pos.coords.latitude);
  const lng = Number(pos.coords.longitude);
  const acc = Number(pos.coords.accuracy);

  if(!Number.isFinite(lat) || !Number.isFinite(lng) || !Number.isFinite(acc)) return;

  samples++;

  const item = {
    lat:lat,
    lng:lng,
    acc:acc,
    pos_ms:Number(pos.timestamp || Date.now()),
    received_ms:Date.now()
  };

  if(!best || item.acc < best.acc) best = item;

  const elapsed = Date.now() - startedMs;
  const cls = item.acc <= ACCEPT_ACC_M ? 'ok' : 'warn';
  setStatus('GPS測位中 acc=' + item.acc.toFixed(1) + 'm', cls);
  setDetail(
    'sample=' + samples +
    '\nbest=' + best.acc.toFixed(1) + 'm' +
    '\nelapsed=' + elapsed + 'ms' +
    '\n読み込み版: ' + BRIDGE_VERSION
  );

  /*
    精度良好なら早く戻る。
    ただし最初の1点だけで即戻りすぎないよう、短い最小待機を置く。
  */
  if(best.acc <= ACCEPT_ACC_M && elapsed >= MIN_SAMPLE_WAIT_MS){
    finishWithBest('accepted');
  }
}
function onGpsError(err){
  if(returned) return;
  const code = Number(err && err.code || 0);
  const msg = String(err && err.message || err || '');

  if(code === 1){
    stopGps();
    setStatus('位置情報の許可がありません', 'err');
    setDetail(
      'スマホ側で位置情報を許可してください。\n' +
      '許可後に「もう一度取得」を押してください。\n' +
      '読み込み版: ' + BRIDGE_VERSION
    );
    retryBtn.style.display = '';
    backBtn.style.display = '';
    return;
  }

  setStatus('GPS更新待ち code=' + code, 'warn');
  setDetail(
    msg + '\n' +
    '取得済みサンプル=' + samples + '\n' +
    '読み込み版: ' + BRIDGE_VERSION
  );
}
function start(){
  runId++;
  returned = false;
  stopGps();
  best = null;
  samples = 0;
  startedMs = Date.now();

  retryBtn.style.display = 'none';
  backBtn.style.display = 'none';

  if(!returnUrl){
    setStatus('return_urlがありません', 'err');
    setDetail('Pico Wの/logから起動してください。\n読み込み版: ' + BRIDGE_VERSION);
    retryBtn.style.display = '';
    return;
  }

  if(!navigator.geolocation){
    setStatus('位置情報APIが使えません', 'err');
    setDetail('このブラウザではGPS取得できません。\n読み込み版: ' + BRIDGE_VERSION);
    returnToLogImmediate(makePayload(false, 'geolocation_unavailable', {error:'geolocation_unavailable'}));
    return;
  }

  setStatus('GPS測位開始', '');
  setDetail(
    'この画面を前面にしたままGPSを取得します。\n' +
    'Pico W本体にはアクセスせず、スマホ側GPSだけを取得します。\n' +
    '本体操作・本体動作を阻害しません。\n' +
    '読み込み版: ' + BRIDGE_VERSION
  );

  const opt = {
    enableHighAccuracy:true,
    maximumAge:GPS_MAXIMUM_AGE_MS,
    timeout:MAX_WAIT_MS
  };

  try{
    watchId = navigator.geolocation.watchPosition(updateBest, onGpsError, opt);
  }catch(e){
    setStatus('GPS開始失敗', 'err');
    setDetail(String(e && e.message ? e.message : e) + '\n読み込み版: ' + BRIDGE_VERSION);
    returnToLogImmediate(makePayload(false, 'gps_start_exception', {error:String(e && e.message ? e.message : e)}));
    return;
  }

  /*
    getCurrentPositionも並行で1回呼ぶ。
    ブラウザによってwatchPositionの初回通知が遅い場合の保険。
  */
  try{
    navigator.geolocation.getCurrentPosition(updateBest, onGpsError, opt);
  }catch(e){}

  hardTimer = setTimeout(()=>{
    finishWithBest(best ? 'timeout_best' : 'gps_timeout');
  }, MAX_WAIT_MS);
}

retryBtn.addEventListener('click', start);
backBtn.addEventListener('click', manualBack);
window.addEventListener('pagehide', ()=>{
  runId++;
  stopGps();
});

start();
</script>
</body>
</html>
