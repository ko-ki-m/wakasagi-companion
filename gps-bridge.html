<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Wakasagi GPS Bridge</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f7f7f7;color:#111;}
    main{max-width:560px;margin:0 auto;padding:22px 16px;}
    .card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
    h1{font-size:20px;margin:0 0 10px;}
    #status{font-size:16px;font-weight:700;line-height:1.6;}
    #detail{font-size:13px;line-height:1.7;margin-top:8px;color:#444;white-space:pre-line;}
    #best{font-size:15px;line-height:1.7;margin-top:10px;padding:10px;border-radius:10px;background:#f3f6ff;border:1px solid #d9e2ff;white-space:pre-line;}
    .warn{background:#fff7e6!important;border-color:#ffd48a!important;}
    button{font-size:16px;padding:12px 14px;border-radius:10px;border:1px solid #bbb;background:#fff;margin-top:14px;margin-right:8px;}
  </style>
</head>
<body>
<main>
  <div class="card">
    <h1>GPS高精度取得中</h1>
    <div id="status">一桁精度になるまで測位しています。</div>
    <div id="detail">10m以上の別ポイント判定に使うため、acc 9.9m以下になるまでログページへ戻りません。</div>
    <div id="best">最良精度: まだ取得していません</div>
    <button id="retry" type="button" style="display:none;">もう一度取得</button>
    <button id="back" type="button" style="display:none;">ログへ戻る（保存しない）</button>
  </div>
</main>
<script>
(function(){
  'use strict';

  const VERSION = 'gps-bridge-20260529q-wait-one-digit';

  // 10m別ポイント判定に使うGPSなので、一桁精度以外は返さない。
  const TARGET_ACC_M = 8.0;
  const ACCEPT_ACC_M = 9.9;

  // getCurrentPositionは測位収束を保証しないため、Bridge前面中だけ粘る。
  // watchPosition / 定期取得 / 常時取得は使わない。
  const POSITION_TIMEOUT_MS = 30000;
  const RETRY_DELAY_MS = 2000;
  const FIRST_STATUS_AFTER_MS = 30000;

  const $ = (id)=>document.getElementById(id);
  const statusEl = $('status');
  const detailEl = $('detail');
  const bestEl = $('best');
  const retryBtn = $('retry');
  const backBtn = $('back');

  let cancelled = false;
  let attempt = 0;
  let best = null;
  let startedMs = Date.now();

  function qs(name){
    try{ return new URL(location.href).searchParams.get(name) || ''; }
    catch(e){ return ''; }
  }

  function setStatus(s,d){
    if(statusEl) statusEl.textContent = s || '';
    if(detailEl) detailEl.textContent = d || '';
  }

  function setBest(p, extra){
    if(!bestEl) return;
    if(!p){
      bestEl.textContent = '最良精度: まだ取得していません';
      return;
    }
    const elapsed = Math.round((Date.now() - startedMs) / 1000);
    bestEl.textContent =
      '最良精度: acc=' + Number(p.acc).toFixed(1) + 'm' +
      '\n緯度: ' + Number(p.lat).toFixed(7) +
      '\n経度: ' + Number(p.lng).toFixed(7) +
      '\n試行: ' + String(p.attempt || attempt) + '回' +
      '\n経過: ' + elapsed + '秒' +
      (extra ? '\n' + extra : '');
    if(p.acc > ACCEPT_ACC_M) bestEl.classList.add('warn');
    else bestEl.classList.remove('warn');
  }

  function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve, ms));
  }

  function b64Json(obj){
    const json = JSON.stringify(obj || {});
    const bytes = new TextEncoder().encode(json);
    let bin = '';
    for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }

  function normalizeReturnUrl(){
    const rawReturn = qs('return_url');
    const pico = qs('pico');
    let ret = rawReturn || '';

    if(!ret && pico){
      ret = String(pico).replace(/\/+$/,'') + '/log';
    }
    if(!ret){
      ret = '/';
    }

    try{
      const u = new URL(ret, location.href);
      u.hash = '';
      return u.toString();
    }catch(e){
      return ret.split('#')[0];
    }
  }

  const returnUrl = normalizeReturnUrl();
  const sid = qs('sid');
  const reqT = qs('t');
  const reason = qs('reason') || 'gps_bridge';
  const triggerSeq = qs('trigger_seq');
  const triggerTms = qs('trigger_t_ms');
  const activityGapMs = qs('activity_gap_ms');
  const activityCount = qs('activity_count');

  function returnToLog(payload){
    const p = Object.assign({
      v: 1,
      source: 'github_gps_bridge',
      bridge_version: VERSION,
      sid: sid,
      reason: reason,
      req_t: reqT,
      trigger_seq: triggerSeq,
      trigger_t_ms: triggerTms,
      activity_gap_ms: activityGapMs,
      activity_count: activityCount,
      bridge_ms: Date.now()
    }, payload || {});
    location.href = returnUrl.split('#')[0] + '#gpsbridge=' + encodeURIComponent(b64Json(p));
  }

  function showControls(){
    if(retryBtn) retryBtn.style.display = '';
    if(backBtn) backBtn.style.display = '';
  }

  function posToPlain(pos){
    const c = pos && pos.coords ? pos.coords : {};
    return {
      lat: Number(c.latitude),
      lng: Number(c.longitude),
      acc: Number(c.accuracy || 0),
      pos_ms: Number(pos && pos.timestamp ? pos.timestamp : Date.now())
    };
  }

  function validPlain(p){
    return !!p && Number.isFinite(p.lat) && Number.isFinite(p.lng) && Number.isFinite(p.acc) && p.acc > 0;
  }

  function getPositionOnce(){
    return new Promise((resolve, reject)=>{
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        timeout: POSITION_TIMEOUT_MS,
        maximumAge: 0
      });
    });
  }

  async function acquireUntilOneDigit(){
    let lastError = null;

    while(!cancelled){
      attempt++;
      const elapsed = Math.round((Date.now() - startedMs) / 1000);
      setStatus(
        'GPS高精度取得中',
        'acc ' + ACCEPT_ACC_M + 'm以下になるまでログページへ戻りません。\n試行 ' + attempt + '回目 / 経過 ' + elapsed + '秒'
      );

      try{
        const pos = await getPositionOnce();
        const p = Object.assign({attempt:attempt}, posToPlain(pos));
        if(validPlain(p)){
          if(!best || p.acc < best.acc){
            best = p;
          }
          setBest(best, '今回 acc=' + p.acc.toFixed(1) + 'm');

          if(p.acc <= ACCEPT_ACC_M){
            const accepted = best && best.acc <= ACCEPT_ACC_M ? best : p;
            setStatus('GPS取得成功', 'acc=' + Number(accepted.acc).toFixed(1) + 'm\nログページへ戻ります。');
            await sleep(350);
            returnToLog({
              ok: true,
              lat: accepted.lat,
              lng: accepted.lng,
              acc: Number(accepted.acc),
              pos_ms: Number(accepted.pos_ms || Date.now()),
              t_ms: Date.now(),
              attempts: Number(attempt || 1),
              target_acc_m: TARGET_ACC_M,
              accept_acc_m: ACCEPT_ACC_M,
              target_met: !!(accepted.acc <= TARGET_ACC_M),
              accepted: true,
              timeout_ms: POSITION_TIMEOUT_MS,
              maximum_age_ms: 0
            });
            return;
          }
        }
      }catch(err){
        lastError = err || null;
        const msg = String((err && err.message) || 'position unavailable');
        setBest(best, '直近エラー: ' + msg);
      }

      if(Date.now() - startedMs > FIRST_STATUS_AFTER_MS){
        showControls();
        if(backBtn){
          backBtn.onclick = function(){
            cancelled = true;
            // 精度不足では座標を返さず、/log側に保存させない。
            returnToLog({
              ok:false,
              error:'accuracy_not_reached_manual_return',
              error_message:'一桁精度に到達しないため手動で戻りました。',
              best_acc: best && Number.isFinite(best.acc) ? Number(best.acc) : 0,
              attempts: attempt,
              target_acc_m: TARGET_ACC_M,
              accept_acc_m: ACCEPT_ACC_M,
              t_ms: Date.now()
            });
          };
        }
      }

      await sleep(RETRY_DELAY_MS);
    }
  }

  async function start(){
    cancelled = false;
    attempt = 0;
    best = null;
    startedMs = Date.now();
    setBest(null);
    if(retryBtn) retryBtn.style.display = 'none';
    if(backBtn) backBtn.style.display = 'none';

    if(!('geolocation' in navigator)){
      returnToLog({ ok:false, error:'no_geolocation', error_message:'このブラウザでは位置情報を使えません。', bridge_version:VERSION });
      return;
    }

    try{
      await acquireUntilOneDigit();
    }catch(e){
      showControls();
      setStatus('GPS取得エラー', String(e && e.message ? e.message : e));
      if(backBtn){
        backBtn.onclick = function(){
          returnToLog({ ok:false, error:'bridge_exception', error_message:String(e && e.message ? e.message : e), t_ms:Date.now() });
        };
      }
    }
  }

  if(retryBtn){
    retryBtn.onclick = start;
  }

  start();
})();
</script>
</body>
</html>
