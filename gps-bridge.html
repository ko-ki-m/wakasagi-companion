<!doctype html>
<html lang="ja">
<head>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
 <meta name="theme-color" content="#07111f">
 <meta name="google" content="notranslate">
 <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
 <meta http-equiv="Pragma" content="no-cache">
 <title>Wakasagi GPS Bridge</title>
 <style>
 body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#07111f;color:#f8fafc;}
 main{max-width:680px;margin:0 auto;padding:22px 16px;}
 .card{background:#0f172a;border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.25);}
 h1{font-size:22px;margin:0 0 10px;}
 p{line-height:1.65;color:#cbd5e1;}
 #status{font-size:17px;font-weight:700;color:#fff;margin:12px 0;}
 button{font-size:17px;font-weight:700;border:0;border-radius:14px;padding:14px 18px;background:#38bdf8;color:#00111c;width:100%;margin-top:12px;}
 button:disabled{opacity:.45;}
 pre{white-space:pre-wrap;word-break:break-word;background:#020617;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;color:#dbeafe;max-height:260px;overflow:auto;}
 .warn{color:#fbbf24;}.bad{color:#fb7185;}.good{color:#86efac;}
 </style>
</head>
<body>
<main>
 <div class="card">
  <h1>Wakasagi GPS Bridge</h1>
  <p>HTTPSでスマホGPSを測位し、Pico Wのログページへ戻します。古い位置を返さないよう、短時間だけ連続測位します。</p>
  <div id="status">準備中...</div>
  <button id="retry" type="button">GPSを取得して戻る</button>
  <pre id="debug"></pre>
 </div>
</main>
<script>
(function(){
 'use strict';
 const $ = id => document.getElementById(id);
 const status = $('status');
 const debug = $('debug');
 const retry = $('retry');
 const startedAt = Date.now();
 const MIN_WAIT_MS = 3200;
 const MAX_WAIT_MS = 18000;
 const GOOD_ACC_M = 35;
 const ACCEPT_ACC_M = 60;
 let running = false;
 let returned = false;
 let watchId = null;
 let timer = null;
 let samples = 0;
 let best = null;
 let latest = null;

 function setStatus(text, cls){ status.textContent = text; status.className = cls || ''; }
 function param(name){ return new URLSearchParams(location.search).get(name) || ''; }
 function b64(obj){ return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
 function safeReturnUrl(){
  const u = param('return_url');
  if(!u) return '';
  try{
   const parsed = new URL(u, location.href);
   if(parsed.protocol !== 'http:' && parsed.protocol !== 'https:') return '';
   return parsed.href.split('#')[0];
  }catch(e){ return ''; }
 }
 function stopWatch(){
  if(watchId !== null){ try{ navigator.geolocation.clearWatch(watchId); }catch(e){} watchId = null; }
  if(timer){ clearTimeout(timer); timer = null; }
 }
 function toPoint(pos){
  const c = pos && pos.coords ? pos.coords : {};
  const lat = Number(c.latitude);
  const lng = Number(c.longitude);
  const acc = Number(c.accuracy || 0);
  const ts = Number(pos && pos.timestamp ? pos.timestamp : Date.now());
  if(!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
  return {lat:lat,lng:lng,acc:Number.isFinite(acc)?acc:999999,ts:Number.isFinite(ts)?ts:Date.now()};
 }
 function isFresh(p){ return p && p.ts >= startedAt - 3000; }
 function isBetter(a,b){
  if(!b) return true;
  const af = isFresh(a), bf = isFresh(b);
  if(af !== bf) return af;
  if(a.acc !== b.acc) return a.acc < b.acc;
  return a.ts > b.ts;
 }
 function showPoint(prefix,p){
  const age = Math.max(0,(Date.now()-p.ts)/1000);
  debug.textContent = prefix + '\n' + JSON.stringify({
   sid:param('sid'),
   lat:Number(p.lat.toFixed(7)),
   lng:Number(p.lng.toFixed(7)),
   acc:Number(p.acc.toFixed(1)),
   pos_ms:p.ts,
   age_sec:Number(age.toFixed(1)),
   samples:samples
  }, null, 2);
 }
 function finish(reason){
  if(returned) return;
  const p = best || latest;
  if(!p){ fail({message:'位置情報が取得できませんでした'}); return; }
  if(!isFresh(p)){
   fail({message:'新しい位置情報が取得できませんでした。もう一度押してください。'});
   return;
  }
  if(Number.isFinite(p.acc) && p.acc > ACCEPT_ACC_M){
   fail({message:'GPS精度不足: '+p.acc.toFixed(1)+'m。60m以内になるまで再取得してください。'});
   return;
  }
  returned = true;
  stopWatch();
  const payload = {
   v:1,
   source:'github_gps_bridge_20260524c',
   sid:param('sid'),
   lat:Number(p.lat.toFixed(7)),
   lng:Number(p.lng.toFixed(7)),
   acc:Number(p.acc.toFixed(1)),
   pos_ms:p.ts,
   t_ms:Date.now(),
   samples:samples,
   reason:reason || ''
  };
  const returnUrl = safeReturnUrl();
  debug.textContent = JSON.stringify(payload, null, 2);
  if(!returnUrl){ setStatus('戻り先URLがありません。', 'bad'); return; }
  setStatus('Pico Wログへ戻ります...', 'good');
  location.replace(returnUrl + '#gpsbridge=' + encodeURIComponent(b64(payload)));
 }
 function onPosition(pos){
  if(returned) return;
  const p = toPoint(pos);
  if(!p) return;
  samples++;
  latest = p;
  if(isBetter(p,best)) best = p;
  showPoint('測位中: '+samples+'回', p);
  const elapsed = Date.now() - startedAt;
  const fresh = isFresh(p);
  if(fresh && p.acc <= GOOD_ACC_M && elapsed >= 2200){ finish('good_accuracy'); return; }
  if(fresh && p.acc <= ACCEPT_ACC_M && samples >= 2 && elapsed >= MIN_WAIT_MS){ finish('accepted_accuracy'); return; }
 }
 function fail(err){
  stopWatch();
  running = false;
  returned = false;
  retry.disabled = false;
  setStatus('GPS取得失敗: ' + (err && err.message ? err.message : 'unknown'), 'bad');
 }
 function requestGps(){
  if(running || returned) return;
  if(!window.isSecureContext){ setStatus('HTTPSではないためGPSを取得できません。', 'bad'); return; }
  if(!('geolocation' in navigator)){ setStatus('このブラウザはGPS取得に対応していません。', 'bad'); return; }
  running = true;
  retry.disabled = true;
  setStatus('スマホGPSを連続測位しています...', 'warn');
  debug.textContent = '古い座標を避けるため、数秒だけ測位します。';
  try{
   watchId = navigator.geolocation.watchPosition(onPosition, fail, {enableHighAccuracy:true, timeout:15000, maximumAge:0});
   timer = setTimeout(function(){ finish('timeout_best'); }, MAX_WAIT_MS);
  }catch(e){ fail(e); }
 }
 retry.addEventListener('click', requestGps);
 setTimeout(requestGps, 300);
})();
</script>
</body>
</html>
