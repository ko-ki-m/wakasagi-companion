<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>Wakasagi Map v11.9 Senior UI</title>
  <link rel="manifest" href="./manifest-v119.webmanifest?v=v119_final_20260509">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="./style-v119.css?v=v119_final_20260509">
</head>
<body>
  <header class="topbar">
    <div>
      <div id="versionLabel" class="version">Wakasagi Map v11.9 Senior UI</div>
      <h1>過去釣行履歴マップ</h1>
    </div>
    <div class="topActions">
      <button id="btnBackLog" class="topBtn">LOGへ戻る</button>
      <button id="btnBackRemote" class="topBtn">操作パネルへ</button>
    </div>
  </header>

  <section class="statusRow">
    <span id="secureBadge" class="badge">確認中</span>
    <span id="picoBadge" class="badge">Pico W: 未設定</span>
    <span id="linkBadge" class="badge">本体ログ: 未接続</span>
    <span id="autoBadge" class="badge">自動連携: 待機</span>
    <span id="countBadge" class="badge">履歴 0件</span>
  </section>

  <main>
    <section class="mapPanel">
      <div id="map"></div>
      <div class="mapButtons">
        <button id="btnLocate" class="bigBtn">現在地</button>
        <button id="btnFitAll" class="bigBtn">全履歴</button>
      </div>
    </section>

    <section class="panel">
      <h2>選択した釣行回の詳細</h2>
      <div id="selectedDetail" class="emptyBox">数字ピンをタップすると、その場所の過去釣行日だけを表示します。日付をタップすると詳細を表示します。</div>
      <button id="btnLinkSelected" class="wideBtn" disabled>この地点を本体ログへ連携</button>
      <p id="linkStatus" class="note">Pico W IPがある場合だけ連携できます。</p>
    </section>

    <section class="panel">
      <h2>Pico W IP</h2>
      <input id="picoIpInput" class="textInput" placeholder="例: 192.168.4.1">
      <p class="note">/log または /remote から開いた場合は ?pico=... を自動で受け取ります。</p>
    </section>

    <section class="panel">
      <h2>全過去釣行履歴</h2>
      <div id="historyList" class="historyList">読み込み中...</div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="./app-v119.js?v=v119_final_20260509"></script>
</body>
</html>
