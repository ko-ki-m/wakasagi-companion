<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ワカサギ viewer 受信保存</title>
<style>
  :root{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111;background:#f7f7f7;}
  body{margin:0;padding:16px;}
  main{max-width:760px;margin:0 auto;background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.12);}
  h1{font-size:22px;margin:0 0 12px;}
  .box{border:1px solid #ddd;border-radius:10px;padding:12px;margin:12px 0;background:#fafafa;}
  .ok{color:#087a2a;font-weight:700;}
  .ng{color:#b00020;font-weight:700;}
  .warn{color:#9a5b00;font-weight:700;}
  textarea{width:100%;min-height:180px;box-sizing:border-box;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;}
  button{font-size:16px;padding:10px 14px;border:0;border-radius:10px;background:#111;color:white;margin:4px 4px 4px 0;}
  a.button{display:inline-block;text-decoration:none;font-size:16px;padding:10px 14px;border-radius:10px;background:#333;color:white;margin:4px 4px 4px 0;}
  code{font-family:ui-monospace,Menlo,Consolas,monospace;background:#eee;padding:1px 4px;border-radius:4px;}
  pre{white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;background:#f0f0f0;border-radius:10px;padding:10px;}
</style>
</head>
<body>
<main>
  <h1>ワカサギ viewer 受信保存</h1>
  <div id="status" class="box">/log からのデータ受信待ちです。</div>
  <div class="box">
    <div>受信データ確認欄</div>
    <textarea id="importText" placeholder="通常は /log のブックマークレットから自動入力されます。手動確認時だけJSONを貼り付けます。"></textarea>
    <div>
      <button id="btnSave">この内容を保存</button>
      <a class="button" href="./">viewerへ戻る</a>
    </div>
  </div>
  <div class="box">
    <div>結果</div>
    <pre id="log"></pre>
  </div>
</main>
<script>
(function(){
'use strict';

const DB_NAME = 'wakasagi_trip_map_v10';
const STORE = 'trip_records';
const MIN_VALID_MS = Date.UTC(2020,0,1);
const MAX_REASONABLE_MS = Date.UTC(2100,0,1);
const TRUSTED_LOG_ORIGIN_ALLOW_EMPTY = true;
const stEl = document.getElementById('status');
const logEl = document.getElementById('log');
const textEl = document.getElementById('importText');
const btnSave = document.getElementById('btnSave');

function setStatus(html, cls){ stEl.className = 'box ' + (cls || ''); stEl.innerHTML = html; }
function log(msg){ logEl.textContent += String(msg || '') + '\n'; }
function clearLog(){ logEl.textContent = ''; }
function n(v){ const x = Number(v); return Number.isFinite(x) ? x : 0; }
function s(v){ return v === undefined || v === null ? '' : String(v); }
function clean(v){ return s(v).trim(); }
function validMs(v){ const x = n(v); return x >= MIN_VALID_MS && x < MAX_REASONABLE_MS ? x : 0; }
function validLat(v){ const x = Number(v); return Number.isFinite(x) && x >= -90 && x <= 90 ? x : null; }
function validLng(v){ const x = Number(v); return Number.isFinite(x) && x >= -180 && x <= 180 ? x : null; }
function pick(){
  for(let i=0;i<arguments.length;i++){
    const v = arguments[i];
    if(v !== undefined && v !== null && String(v).trim() !== '') return v;
  }
  return '';
}
function makeId(prefix){
  return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,10);
}
function tryJson(raw){
  if(!raw) throw new Error('入力が空です');
  const txt = String(raw).trim();
  if(!txt) throw new Error('入力が空です');

  // URL形式: #payload=... / #logsync=...
  if(/^https?:\/\//i.test(txt) || txt.indexOf('#payload=') >= 0 || txt.indexOf('#logsync=') >= 0){
    let hash = '';
    try{ hash = new URL(txt, location.href).hash || ''; }catch(_){
      const p = txt.indexOf('#');
      hash = p >= 0 ? txt.slice(p) : txt;
    }
    const m = hash.match(/#(?:payload|logsync)=([^&]+)/);
    if(!m) throw new Error('URL内に #payload= または #logsync= がありません');
    const enc = decodeURIComponent(m[1]);
    return decodePayloadText(enc);
  }

  return decodePayloadText(txt);
}
function decodePayloadText(txt){
  const t = String(txt || '').trim();
  if(!t) throw new Error('payloadが空です');
  try{ return JSON.parse(t); }catch(_){ }

  // /log側の mapSyncB64 は日本語対策されたbase64想定。複数方式で復元する。
  const b64 = t.replace(/-/g,'+').replace(/_/g,'/');
  const pad = b64 + '==='.slice((b64.length + 3) % 4);
  try{
    const bin = atob(pad);
    try{
      const bytes = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
      return JSON.parse(new TextDecoder('utf-8').decode(bytes));
    }catch(_){
      return JSON.parse(decodeURIComponent(escape(bin)));
    }
  }catch(e){
    throw new Error('JSON/base64として読めません: ' + (e && e.message ? e.message : e));
  }
}

function unwrapMessageData(data){
  if(data && data.type === 'wakasagi.viewer_import.v1') return data.payload || data.data || data;
  if(data && data.payload && (data.source === 'pico_log_bookmarklet' || data.schema === 'wakasagi.viewer_import.v1')) return data.payload;
  return data;
}
function hasActivity(v, root){
  const motor = n(pick(v.motor_count, v.motorCount));
  const pulse = n(pick(v.pulse_count, v.pulseCount));
  const fev = n(pick(v.fishing_event_count, v.fishingEventCount));
  const rows = Array.isArray(v.tlog_activity_rows) ? v.tlog_activity_rows.length : n(v.tlog_activity_row_count);
  const rootRows = Array.isArray(root && root.tlog_activity_rows) ? root.tlog_activity_rows.length : n(root && root.tlog_activity_row_count);
  const reason = clean(pick(v.activity_reason, v.reason)).toLowerCase();
  return motor > 0 || pulse > 0 || fev > 0 || rows > 0 || rootRows > 0 || /motor|pulse|event|activity|実釣/.test(reason);
}
function startMsOf(v, root){
  return validMs(pick(v.point_start_ms, v.visit_start_ms, v.start_ms, v.first_recv_ms, root && root.start_ms, root && root.first_recv_ms));
}
function endMsOf(v, root){
  return validMs(pick(v.point_end_ms, v.visit_end_ms, v.updated_ms, v.end_ms, v.last_recv_ms, root && root.updated_ms, root && root.last_recv_ms));
}
function latOf(v, root){ return validLat(pick(v.lat, v.gps_lat, v.latest_lat, root && root.lat, root && root.gps_lat)); }
function lngOf(v, root){ return validLng(pick(v.lng, v.lon, v.gps_lng, v.latest_lng, root && root.lng, root && root.lon, root && root.gps_lng)); }

function normalizePayload(input){
  const root = unwrapMessageData(input) || {};
  const sourceArray =
    Array.isArray(root.normalized_visits) ? root.normalized_visits :
    Array.isArray(root.visits) ? root.visits :
    Array.isArray(root.gps_visit_candidates) ? root.gps_visit_candidates :
    Array.isArray(root.gps_candidates) ? root.gps_candidates :
    [root];

  const visits = [];
  const rejected = [];
  const sid = clean(root.sid || (sourceArray[0] && sourceArray[0].sid) || '');

  sourceArray.forEach((raw, idx)=>{
    const v = raw || {};
    const lat = latOf(v, root);
    const lng = lngOf(v, root);
    const startMs = startMsOf(v, root);
    const endMs = endMsOf(v, root);
    const act = hasActivity(v, root);
    const label = clean(pick(v.gps_visit_id, v.visit_id, v.point_visit_id, v.candidate_no, idx + 1));

    if(lat === null || lng === null){ rejected.push(label + ': 座標なし'); return; }
    if(!startMs){ rejected.push(label + ': 開始時刻なし/1970相当'); return; }
    if(!endMs){ rejected.push(label + ': 終了時刻なし/1970相当'); return; }
    if(endMs < startMs){ rejected.push(label + ': 終了時刻が開始時刻より前'); return; }
    if(!act){ rejected.push(label + ': 実釣証拠なし'); return; }

    const visitId = clean(pick(v.gps_visit_id, v.visit_id, v.point_visit_id, root.point_visit_id)) || makeId('visit');
    const tripId = 'viewer_import_' + (sid || 'nosid') + '_' + visitId + '_' + startMs;
    const lakeName = clean(pick(v.lake_name, v.place_name, root.lake_name, root.place_name));
    const windText = clean(pick(v.wind, root.wind));
    const weatherText = clean(pick(v.weather_text, v.weather, root.weather_text, root.weather));

    const rec = {
      id: tripId,
      trip_id: tripId,
      source: 'viewer_import_receiver_20260618c',
      saved_by: 'viewer_import_receiver_addonly',
      schema: 'wakasagi.trip_record.import.v1',
      sid: sid,
      gps_visit_id: visitId,
      candidate_no: n(pick(v.candidate_no, idx + 1)) || (idx + 1),

      date_ms: startMs,
      start_ms: startMs,
      updated_ms: endMs,
      trip_start_ms: validMs(pick(root.trip_start_ms, root.start_ms, root.first_recv_ms)) || startMs,
      trip_end_ms: validMs(pick(root.trip_end_ms, root.updated_ms, root.last_recv_ms)) || endMs,
      point_start_ms: startMs,
      point_end_ms: endMs,
      first_recv_ms: validMs(pick(v.first_recv_ms, root.first_recv_ms)) || startMs,
      last_recv_ms: validMs(pick(v.last_recv_ms, root.last_recv_ms)) || endMs,

      lat: lat,
      lng: lng,
      lon: lng,
      gps_lat: String(lat),
      gps_lng: String(lng),
      accuracy_m: clean(pick(v.accuracy_m, v.acc_m, v.gps_acc_m, root.gps_acc_m)),
      gps_acc_m: clean(pick(v.gps_acc_m, v.acc_m, root.gps_acc_m)),
      gps_quality: clean(pick(v.gps_quality, root.gps_quality)),
      gps_quality_label: clean(pick(v.gps_quality_label, root.gps_quality_label)),

      lake_name: lakeName,
      place_name: lakeName,
      point_name: clean(pick(v.point_name, root.point_name)),
      line_no: clean(pick(v.line_no, root.line_no)),
      sinker_g: clean(pick(v.sinker_g, root.sinker_g)),
      sinker_g_x10: pick(v.sinker_g_x10, root.sinker_g_x10, ''),
      fishfinder_depth_m: clean(pick(v.fishfinder_depth_m, v.water_depth_m, root.fishfinder_depth_m, root.water_depth_m)),
      water_depth_m: clean(pick(v.water_depth_m, v.fishfinder_depth_m, root.water_depth_m, root.fishfinder_depth_m)),
      water_temp_c: clean(pick(v.water_temp_c, root.water_temp_c)),
      weather: weatherText,
      weather_text: weatherText,
      wind: windText,
      wind_dir: clean(pick(v.wind_dir, root.wind_dir)),
      wind_speed_mps: clean(pick(v.wind_speed_mps, root.wind_speed_mps)),
      pressure_hpa: clean(pick(v.pressure_hpa, root.pressure_hpa)),
      note: clean(pick(v.note, root.note)),

      fish_count: n(pick(v.fish_count, root.fish_count)),
      mark_count: n(pick(v.mark_count, root.mark_count)),
      tlog_count: n(pick(v.tlog_count, root.tlog_count)),
      tlog_activity_row_count: Array.isArray(v.tlog_activity_rows) ? v.tlog_activity_rows.length : n(pick(v.tlog_activity_row_count, root.tlog_activity_row_count)),
      first_seq: pick(v.first_seq, root.first_seq, ''),
      last_seq: pick(v.last_seq, root.last_seq, ''),
      first_t_ms: pick(v.first_t_ms, root.first_t_ms, ''),
      last_t_ms: pick(v.last_t_ms, root.last_t_ms, ''),
      min_depth_m: clean(pick(v.min_depth_m, root.min_depth_m)),
      max_depth_m: clean(pick(v.max_depth_m, root.max_depth_m)),
      motor_count: n(pick(v.motor_count, root.motor_count)),
      pulse_count: n(pick(v.pulse_count, root.pulse_count)),
      fishing_event_count: n(pick(v.fishing_event_count, root.fishing_event_count)),
      depth_range_mm: n(pick(v.depth_range_mm, root.depth_range_mm)),
      activity_reason: clean(pick(v.activity_reason, root.activity_reason)),
      used_sasoi: clean(pick(v.used_sasoi, root.used_sasoi)),
      used_speed: clean(pick(v.used_speed, root.used_speed)),

      pico_summary: root,
      pico_payload: root,
      pico_visit_payload: v,
      tlog_activity_rows: Array.isArray(v.tlog_activity_rows) ? v.tlog_activity_rows : (Array.isArray(root.tlog_activity_rows) ? root.tlog_activity_rows : []),
      created_ms: Date.now(),
      updated_import_ms: Date.now()
    };
    visits.push(rec);
  });

  return {visits, rejected, source_count:sourceArray.length, sid};
}

function openTripDb(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME);
    req.onupgradeneeded = (ev)=>{
      const db = ev.target.result;
      if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, {keyPath:'id'});
    };
    req.onerror = ()=>reject(req.error || new Error('IndexedDBを開けません'));
    req.onsuccess = ()=>{
      const db = req.result;
      if(db.objectStoreNames.contains(STORE)){ resolve(db); return; }
      const nextVersion = db.version + 1;
      db.close();
      const req2 = indexedDB.open(DB_NAME, nextVersion);
      req2.onupgradeneeded = (ev)=>{
        const db2 = ev.target.result;
        if(!db2.objectStoreNames.contains(STORE)) db2.createObjectStore(STORE, {keyPath:'id'});
      };
      req2.onerror = ()=>reject(req2.error || new Error('trip_recordsを作成できません'));
      req2.onsuccess = ()=>resolve(req2.result);
    };
  });
}
function putRecords(db, records){
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    records.forEach(rec=>{
      if(store.keyPath) store.put(rec);
      else store.put(rec, rec.id);
    });
    tx.oncomplete = ()=>resolve(records.length);
    tx.onerror = ()=>reject(tx.error || new Error('保存失敗'));
    tx.onabort = ()=>reject(tx.error || new Error('保存中断'));
  });
}
async function saveInput(input){
  clearLog();
  const payload = typeof input === 'string' ? tryJson(input) : unwrapMessageData(input);
  const norm = normalizePayload(payload);
  log('受信候補: ' + norm.source_count + ' 件');
  if(norm.rejected.length){ log('除外:'); norm.rejected.forEach(r=>log(' - ' + r)); }
  if(!norm.visits.length){
    setStatus('保存なし：保存条件を満たす実釣visitがありません。', 'warn');
    return;
  }
  const db = await openTripDb();
  try{
    const count = await putRecords(db, norm.visits);
    setStatus('保存完了: ' + count + '地点', 'ok');
    log('保存完了: ' + count + '地点');
    norm.visits.forEach((r,i)=>log((i+1) + '. ' + new Date(r.point_start_ms).toLocaleString() + ' lat=' + r.lat + ' lng=' + r.lng + ' id=' + r.id));
  }finally{
    try{ db.close(); }catch(_){ }
  }
}

btnSave.addEventListener('click', async ()=>{
  try{ await saveInput(textEl.value); }catch(e){ setStatus('保存失敗: ' + (e && e.message ? e.message : e), 'ng'); log(e && e.stack ? e.stack : e); }
});

window.addEventListener('message', async (ev)=>{
  const d = ev.data;
  if(!d || d.type !== 'wakasagi.viewer_import.v1') return;
  try{
    textEl.value = JSON.stringify(d.payload || d, null, 2);
    setStatus('/log からデータを受信しました。保存中です。', 'warn');
    await saveInput(d.payload || d);
  }catch(e){
    setStatus('受信後の保存失敗: ' + (e && e.message ? e.message : e), 'ng');
    log(e && e.stack ? e.stack : e);
  }
}, false);

try{
  const params = new URLSearchParams(location.search);
  const q = params.get('payload') || params.get('logsync');
  if(q){ textEl.value = q; saveInput(q).catch(e=>{ setStatus('URL payload保存失敗: ' + (e && e.message ? e.message : e), 'ng'); log(e && e.stack ? e.stack : e); }); }
}catch(_){ }
})();
</script>
</body>
</html>
