<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Wakasagi Map v11.8.2 Force Update</title>
<style>
body{font-family:system-ui,-apple-system,sans-serif;background:#07111f;color:#fff;margin:0;padding:22px}
.card{max-width:720px;margin:auto;background:#fff;color:#111;border-radius:18px;padding:18px}
button{font:inherit;font-weight:950;border:1px solid #ccc;border-radius:12px;background:#0b84ff;color:white;padding:12px;margin-top:10px}
code{word-break:break-all}
</style>
</head>
<body>
<div class="card">
<h1>Wakasagi Map v11.8.2 強制更新</h1>
<p id="s">古いService Workerとキャッシュを削除しています...</p>
<p>移動先：<code>index.html?v=1182</code></p>
<button id="b" style="display:none">v11.8.2を開く</button>
</div>
<script>
(async()=>{
 const s=document.getElementById('s');
 try{
   if('serviceWorker' in navigator){
     const regs=await navigator.serviceWorker.getRegistrations();
     for(const r of regs){ await r.unregister(); }
   }
   if('caches' in window){
     const keys=await caches.keys();
     for(const k of keys){ await caches.delete(k); }
   }
   s.textContent='削除完了。v11.8.2へ移動します。';
 }catch(e){
   s.textContent='更新処理エラー: '+(e&&e.message?e.message:e);
 }
 const url='./index.html?v=1182&force='+Date.now();
 const b=document.getElementById('b');
 b.style.display='block';
 b.onclick=()=>location.replace(url);
 setTimeout(()=>location.replace(url),1000);
})();
</script>
</body>
</html>
