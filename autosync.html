<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wakasagi AutoSync</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07111f;color:#e5eefc;margin:0;padding:12px;font-size:14px}#st{white-space:pre-wrap}
</style>
</head>
<body>
<div id="st">autosync ready</div>
<script>
(function(){
'use strict';
const DB_NAME='wakasagi_trip_map_v10';
const DB_VER=1;
const STORE_TRIPS='trip_records';
const STORE_META='meta';
let db=null;
let busy=false;
let cancelToken=0;
const $=(id)=>document.getElementById(id);
function setStatus(t){try{ $('st').textContent=String(t||''); }catch(e){}}
function s(v){return String(v==null?'':v).trim();}
function n(v){const x=Number(v);return Number.isFinite(x)?x:null;}
function firstNum(){for(const v of arguments){const x=n(v);if(x!==null&&x>0)return x;}return null;}
function validLatLng(lat,lng){return Number.isFinite(lat)&&Number.isFinite(lng)&&lat>=-90&&lat<=90&&lng>=-180&&lng<=180&&!(lat===0&&lng===0);}
function genId(p){return String(p||'T')+Date.now().toString(36)+Math.floor(Math.random()*0xfffff).toString(16).padStart(5,'0');}
function hasBodyActivityProof(p){
  if(!p) return false;
  if(Number(p.motor_count||0)>0) return true;
  if(Number(p.pulse_count||0)>0) return true;
  if(Number(p.fishing_event_count||0)>0) return true;
  const r=s(p.activity_reason||'');
  return /(^|,)(motorRun|pulse|event)(,|$)/.test(r);
}
function hasLatLng(p){
  const lat=Number(p&&(p.gps_lat||p.latest_lat||p.lat));
  const lng=Number(p&&(p.gps_lng||p.latest_lng||p.lng));
  return validLatLng(lat,lng);
}
function openDb(){return new Promise((resolve,reject)=>{
  const req=indexedDB.open(DB_NAME,DB_VER);
  req.onupgradeneeded=()=>{
    const d=req.result;
    if(!d.objectStoreNames.contains(STORE_TRIPS)){
      const st=d.createObjectStore(STORE_TRIPS,{keyPath:'trip_id'});
      st.createIndex('date_ms','date_ms',{unique:false});
    }
    if(!d.objectStoreNames.contains(STORE_META)) d.createObjectStore(STORE_META,{keyPath:'key'});
  };
  req.onsuccess=()=>{db=req.result;resolve(db);};
  req.onerror=()=>reject(req.error||new Error('openDb failed'));
});}
function store(name,mode){return db.transaction(name,mode||'readonly').objectStore(name);}
function getAllTrips(){return new Promise(res=>{try{const r=store(STORE_TRIPS).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>res([]);}catch(e){res([]);}});}
function putTrip(t){return new Promise(res=>{try{const tx=db.transaction(STORE_TRIPS,'readwrite');tx.objectStore(STORE_TRIPS).put(t);tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);}catch(e){res(false);}});}
function metaSet(k,v){return new Promise(res=>{try{const tx=db.transaction(STORE_META,'readwrite');tx.objectStore(STORE_META).put({key:k,value:v});tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);}catch(e){res(false);}});}
async function findTripByVisitId(visitId){
  const key=s(visitId);
  if(!key) return null;
  const trips=await getAllTrips();
  for(const t of trips){
    if(s(t.gps_visit_id)===key) return t;
    if(t.pico_summary&&s(t.pico_summary.gps_visit_id)===key) return t;
    if(Array.isArray(t.pico_logs)&&t.pico_logs.some(l=>s(l.gps_visit_id)===key)) return t;
  }
  return null;
}
function mergeVisitPayload(parent,visit){
  const p=Object.assign({},parent||{},visit||{});
  p.__autosync_single_visit=true;
  p.gps_visit_id=s((visit&&(visit.gps_visit_id||visit.visit_id))||(parent&&(parent.gps_visit_id||parent.visit_id)));
  p.gps_lat=s((visit&&(visit.gps_lat||visit.latest_lat||visit.lat))||p.gps_lat||p.lat);
  p.gps_lng=s((visit&&(visit.gps_lng||visit.latest_lng||visit.lng))||p.gps_lng||p.lng);
  p.gps_acc_m=s((visit&&(visit.gps_acc_m||visit.acc_m||visit.acc))||p.gps_acc_m||p.acc);
  p.point_visit_id='';
  p.map_point_key='';
  return p;
}
function makeTripFromPayload(p,old){
  const now=Date.now();
  const lat=Number(p.gps_lat||p.latest_lat||p.lat);
  const lng=Number(p.gps_lng||p.latest_lng||p.lng);
  const visitKey=s(p.gps_visit_id||p.visit_id);
  const tripStartMs=firstNum(p.trip_start_ms,p.start_ms,p.first_recv_ms,p.visit_start_ms,p.date_ms)||now;
  const tripEndMs=firstNum(p.trip_end_ms,p.updated_ms,p.last_recv_ms,p.visit_end_ms,p.end_ms)||tripStartMs;
  const pointStartMs=firstNum(p.point_start_ms,p.visit_start_ms,p.start_ms,p.first_recv_ms)||tripStartMs;
  const pointEndMs=firstNum(p.point_end_ms,p.visit_end_ms,p.updated_ms,p.last_recv_ms)||tripEndMs;
  const t=Object.assign({},old||{});
  t.trip_id=t.trip_id||genId('T');
  t.date_ms=tripStartMs;
  t.start_ms=tripStartMs;
  t.end_ms=tripEndMs;
  t.updated_ms=now;
  t.created_ms=t.created_ms||now;
  t.lat=lat;
  t.lng=lng;
  t.accuracy_m=Number(p.gps_acc_m||p.acc_m||p.acc||0)||0;
  t.location_time_ms=firstNum(p.gps_ms,p.location_time_ms,p.latest_ms)||now;
  t.gps_visit_id=visitKey;
  t.candidate_no=firstNum(p.candidate_no,p.visit_no)||'';
  t.visit_label=s(p.visit_label||(t.candidate_no?('P'+t.candidate_no):''));
  t.pico_point_visit_id=s(p.pico_point_visit_id||p.point_visit_id||p.map_point_key||'');
  t.point_visit_id='';
  t.map_point_key='';
  t.trip_start_ms=tripStartMs;
  t.trip_end_ms=tripEndMs;
  t.point_start_ms=pointStartMs;
  t.point_end_ms=pointEndMs;
  t.visit_start_ms=pointStartMs;
  t.visit_end_ms=pointEndMs;
  t.lake_name=s(p.lake_name||p.place_name||t.lake_name||'');
  t.point_name=s(p.point_name||p.visit_label||t.point_name||'');
  t.line_no=s(p.line_no||t.line_no||'');
  t.sinker_g=s(p.sinker_g||t.sinker_g||'');
  t.fishfinder_depth_m=s(p.fishfinder_depth_m||p.fishfinder_m||p.water_depth_m||t.fishfinder_depth_m||'');
  t.water_temp_c=s(p.water_temp_c||t.water_temp_c||'');
  t.weather=s(p.weather_text||p.weather||t.weather||'');
  t.wind=s(p.wind||p.wind_dir||t.wind||'');
  t.memo=s(p.note||p.memo||t.memo||'');
  t.pico_summary=Object.assign({},t.pico_summary||{},p,{gps_visit_id:visitKey});
  if(!Array.isArray(t.pico_logs)) t.pico_logs=[];
  const log=Object.assign({},p,{gps_visit_id:visitKey, synced_ms:now});
  const idx=t.pico_logs.findIndex(x=>s(x.gps_visit_id)===visitKey);
  if(idx>=0) t.pico_logs[idx]=log; else t.pico_logs.push(log);
  return t;
}
async function applyVisitPayload(p){
  if(!p||!hasLatLng(p)||!hasBodyActivityProof(p)||!s(p.gps_visit_id||p.visit_id)) return false;
  const old=await findTripByVisitId(p.gps_visit_id||p.visit_id);
  const t=makeTripFromPayload(p,old);
  if(!validLatLng(Number(t.lat),Number(t.lng))) return false;
  return await putTrip(t);
}
async function processPayload(payload,myToken){
  if(!db) await openDb();
  const p=payload||{};
  const visits=Array.isArray(p.gps_visit_candidates)
    ? p.gps_visit_candidates.filter(v=>v&&s(v.gps_visit_id||v.visit_id)&&hasLatLng(v)&&hasBodyActivityProof(v))
    : [];
  let saved=0;
  let attempted=0;
  for(const v of visits){
    if(myToken!==cancelToken) return {ok:false,cancelled:true,saved,attempted};
    attempted++;
    const one=mergeVisitPayload(p,v);
    if(await applyVisitPayload(one)) saved++;
    await new Promise(r=>setTimeout(r,0));
  }
  await metaSet('autosync_last_ms',Date.now());
  return {ok:true,cancelled:false,saved,attempted};
}
function reply(origin,data){try{parent.postMessage(Object.assign({type:'wakasagi_autosync_ack'},data||{}),origin||'*');}catch(e){}}
window.addEventListener('message',ev=>{
  const d=ev.data||{};
  if(d.type==='wakasagi_autosync_cancel'){
    cancelToken++;
    setStatus('cancelled');
    reply(ev.origin,{ok:false,cancelled:true,reason:d.reason||'cancel'});
    return;
  }
  if(d.type!=='wakasagi_autosync_payload') return;
  if(busy){ reply(ev.origin,{ok:false,busy:true,sig:d.sig||''}); return; }
  busy=true;
  const myToken=cancelToken;
  setStatus('sync start '+(d.sig||''));
  processPayload(d.payload,myToken).then(res=>{
    setStatus('sync done '+JSON.stringify(res));
    reply(ev.origin,Object.assign({sig:d.sig||''},res));
  }).catch(e=>{
    setStatus('sync error '+(e&&e.message?e.message:e));
    reply(ev.origin,{ok:false,error:String(e&&e.message?e.message:e),sig:d.sig||''});
  }).finally(()=>{busy=false;});
});
openDb().then(()=>{setStatus('autosync ready');try{parent.postMessage({type:'wakasagi_autosync_ready'},'*');}catch(e){}}).catch(e=>setStatus('db error '+(e&&e.message?e.message:e)));
})();
</script>
</body>
</html>
