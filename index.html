<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <title>Wakasagi Trip Viewer</title>
  <link rel="manifest" href="./manifest.webmanifest?v=1184home20260511">
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #07111f;
      color: #eaf2ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .box {
      width: min(520px, 100%);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 18px;
      padding: 22px;
      background: rgba(255,255,255,.06);
      box-shadow: 0 12px 36px rgba(0,0,0,.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
    }
    p {
      margin: 8px 0;
      line-height: 1.7;
      color: #cfe0ff;
    }
    a {
      color: #fff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>過去釣行履歴マップを開いています</h1>
    <p>数字ピン対応版へ移動します。</p>
    <p><a id="openLink" href="./map-v1184.html?v=1184home20260511">開かない場合はここをタップ</a></p>
  </div>

  <script>
    (async function () {
      const target = './map-v1184.html?v=1184home20260511';

      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function (r) { return r.unregister(); }));
        }
      } catch (e) {}

      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(function (k) { return caches.delete(k); }));
        }
      } catch (e) {}

      location.replace(target);
    })();
  </script>
</body>
</html>
