<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"><title>Force Wakasagi Map v11.8.4</title></head>
<body><h1>Wakasagi Map v11.8.4へ戻す</h1><p>古いService WorkerとCacheを消して、v11.8.4を開きます。</p><button id="openBtn">v11.8.4を開く</button>
<script>
async function clearAndOpen(){
  try{
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
  }catch(e){}
  try{
    if(window.caches){
      const keys = await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
  }catch(e){}
  var src = new URL(location.href);
  var dst = new URL('./map-v1184.html', location.href);
  src.searchParams.forEach(function(v,k){ if(k !== 'force') dst.searchParams.set(k,v); });
  dst.searchParams.set('v','1184');
  dst.searchParams.set('force',String(Date.now()));
  location.replace(dst.toString() + (location.hash || ''));
}
document.getElementById('openBtn').onclick=clearAndOpen;
setTimeout(clearAndOpen,300);
</script></body></html>
