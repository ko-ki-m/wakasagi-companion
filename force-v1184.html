<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Force Wakasagi Map v11.8.4 FIX-20260509C</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;padding:24px;font-size:18px;line-height:1.6}
    button{font-size:20px;min-height:56px;padding:12px 18px;border-radius:12px}
  </style>
</head>
<body>
  <h1>Wakasagi Map v11.8.4 FIX-20260509C</h1>
  <p>キャッシュを消して、日付詳細表示と本体ログ連携の修正版を開きます。</p>
  <button id="openBtn">開く</button>
  <script>
    async function cleanup(){
      try{
        if("serviceWorker" in navigator){
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r=>r.unregister()));
        }
      }catch(e){}
      try{
        if("caches" in window){
          const names = await caches.keys();
          await Promise.all(names.map(n=>caches.delete(n)));
        }
      }catch(e){}
    }
    function openMap(){
      const src = new URL(location.href);
      const dst = new URL("./map-v1184.html", location.href);
      src.searchParams.forEach((v,k)=>dst.searchParams.set(k,v));
      dst.searchParams.set("v","FIX_20260509C");
      dst.searchParams.set("force", String(Date.now()));
      dst.hash = src.hash || "";
      location.replace(dst.toString());
    }
    document.getElementById("openBtn").addEventListener("click", async()=>{ await cleanup(); openMap(); });
    cleanup().then(openMap);
  </script>
</body>
</html>
