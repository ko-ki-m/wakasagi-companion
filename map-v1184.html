<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>Wakasagi Map v11.8.4</title>

  <link rel="manifest" href="./manifest-v1184.webmanifest">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIINfQ6k4PaR+EybBkgr+q1mIB8b9zF3mO0=" crossorigin="">
  <link rel="stylesheet" href="./style-v1184.css?v=1184_point_popup_detail_1">
</head>
<body>
  <header class="topbar">
    <div>
      <div class="version">Wakasagi Map v11.8.4</div>
      <h1>過去釣行履歴マップ</h1>
    </div>
    <div class="topActions">
      <button id="btnBackLog" class="bigBtn">LOGへ戻る</button>
      <button id="btnBackRemote" class="bigBtn">操作パネルへ</button>
    </div>
  </header>

  <section class="statusRow">
    <span id="secureBadge" class="badge">確認中</span>
    <span id="picoBadge" class="badge">Pico W: 未設定</span>
    <span id="countBadge" class="badge">履歴 0件</span>
  </section>

  <main>
    <section class="mapPanel">
      <div id="map" aria-label="釣行ポイント地図"></div>
      <div class="mapButtons">
        <button id="btnLocate" class="bigBtn">現在地</button>
        <button id="btnFitAll" class="bigBtn">全履歴</button>
      </div>
    </section>

    <section class="panel">
      <h2>選択した釣行回の詳細</h2>
      <div id="selectedDetail" class="emptyBox">地図上の数字ピンをタップすると、その場所の過去釣行日だけを表示します。日付をタップすると詳細を表示します。</div>
      <button id="btnLinkSelected" class="wideBtn" disabled>この地点を本体ログへ連携</button>
      <p id="linkStatus" class="note">Pico W IP がある場合だけ連携できます。</p>
    </section>

    <section class="panel">
      <h2>全過去釣行履歴</h2>
      <div id="historyList" class="historyList">読み込み中...</div>
    </section>

    <section class="panel">
      <h2>Pico W IP</h2>
      <input id="picoIpInput" class="textInput" placeholder="例: 192.168.4.1">
      <p class="note">URLの ?pico=... があれば自動入力します。自動で/logへは飛ばしません。</p>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="./app-v1184.js?v=1184_point_popup_detail_1"></script>
</body>
</html>
